                <button onclick="saveTaskModal()" class="px-6 py-2.5 bg-[#007aff] text-white rounded-xl font-bold hover:bg-[#2563eb] transition-colors shadow-md">Lưu Lại</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // CẤU HÌNH FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyA8XGvUoCBWs8WUlwC2hUEHPF6RQl6eSM0",
            authDomain: "dailyworkplan-de669.firebaseapp.com",
            databaseURL: "https://dailyworkplan-de669-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dailyworkplan-de669",
            storageBucket: "dailyworkplan-de669.firebasestorage.app",
            messagingSenderId: "703304226095",
            appId: "1:703304226095:web:4b75c9cb7d2f9f32f57dda"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tasksRef = ref(db, 'tasks');

        const STATUS_MAP = { "Not Start": 0, "Pending": 25, "In Progress": 50, "Complete": 100 };

        // Parse chuỗi "YYYY-MM-DD" thành ngày local lúc 00:00 (tránh lệch múi giờ UTC)
        function parseLocalDate(str) {
            if(!str) return null;
            let parts = String(str).split('-');
            if(parts.length !== 3) { let d = new Date(str); d.setHours(0,0,0,0); return d; }
            return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]), 0, 0, 0, 0);
        }

        window.allTasks = [];
        window.currentTab = 'OVERVIEW';
        window.modalState = { mode: '', parentId: null, dbKey: null, isMain: false };
        // Track which main-task groups are collapsed. Key = "TAB:mainId". Default: all collapsed.
        window.collapsedGroups = {};
        window.groupsInitialized = {};

        // ZOOM CONTROL FUNCTIONS
        let currentZoom = 100;
        const minZoom = 50;
        const maxZoom = 200;
        const zoomStep = 10;

        window.zoomIn = function() {
            if (currentZoom < maxZoom) {
                currentZoom += zoomStep;
                applyZoom();
            }
        };

        window.zoomOut = function() {
            if (currentZoom > minZoom) {
                currentZoom -= zoomStep;
                applyZoom();
            }
        };

        window.zoomReset = function() {
            currentZoom = 100;
            applyZoom();
        };

        window.applyZoom = function() {
            const wrapper = document.getElementById('tableWrapper');
            const scale = currentZoom / 100;
            wrapper.style.transform = `scale(${scale})`;
            document.getElementById('zoomLevel').textContent = currentZoom + '%';
            
            // Adjust wrapper height and width for proper scrolling
            wrapper.style.width = (100 / scale) + '%';
            wrapper.style.height = 'auto';
        };

        window.zoomFit = function() {
            try {
                const tableContainer = document.querySelector('.table-container');
                const tableElement = document.getElementById('mainTable');
                const mainContainer = document.querySelector('.max-w-\\[98\\%\\]');
                
                if (!tableElement || !mainContainer) return;
                
                // Get dimensions
                const tableWidth = tableElement.scrollWidth;
                const containerWidth = mainContainer.offsetWidth - 32; // Subtract padding
                
                // Calculate the zoom level needed to fit the table
                const fitZoom = Math.floor((containerWidth / tableWidth) * 100);
                
                // Constrain to min/max range
                currentZoom = Math.max(minZoom, Math.min(maxZoom, fitZoom));
                
                applyZoom();
            } catch (e) {
                console.log('Fit zoom calculation error, using 100%');
                currentZoom = 100;
                applyZoom();
            }
        };

        onValue(tasksRef, (snapshot) => {
            window.allTasks = [];
            snapshot.forEach((child) => { window.allTasks.push({ dbKey: child.key, ...child.val() }); });
            
            window.allTasks.sort((a, b) => {
                let aParts = a.taskId.split('.').map(Number);
                let bParts = b.taskId.split('.').map(Number);
                for(let i=0; i < Math.max(aParts.length, bParts.length); i++) {
                    let av = aParts[i] || 0; let bv = bParts[i] || 0;
                    if(av !== bv) return av - bv;
                }
                return 0;
            });
            updateTabCounts();
            if(window.currentTab === 'OVERVIEW') { renderOverview(); }
            else { renderView(); }
        });

        // Khởi tạo: mở tab Tổng quan khi tải trang (đặt đúng trạng thái ẩn/hiện)
        function initOverviewTab() {
            if(typeof switchTab === 'function') switchTab('OVERVIEW');
        }
        if(document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', initOverviewTab);
        } else {
            initOverviewTab();
        }

        // Đếm số CÔNG VIỆC CHÍNH (chưa lưu trữ) cho mỗi công ty, hiển thị trên tab.
        // CV đã lưu trữ (archived) tự động không được tính -> "reset" bộ đếm.
        window.updateTabCounts = function() {
            ['SVL','SGV','SVN','PERSONAL'].forEach(comp => {
                let count = window.allTasks.filter(t =>
                    t.company === comp &&
                    !t.taskId.includes('.') &&
                    t.archived !== true
                ).length;
                let el = document.getElementById('count-' + comp);
                if(el) el.innerText = count;
            });
        };

        window.switchTab = function(tabName) {
            window.currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            
            let isOverview = (tabName === 'OVERVIEW');
            
            // Overview: ẩn bảng + form nhập + controls, hiện dashboard
            document.getElementById('overviewDashboard').classList.toggle('hidden', !isOverview);
            document.getElementById('tableWrapper').style.display = isOverview ? 'none' : '';
            document.getElementById('quickAddForm').style.display = isOverview ? 'none' : '';
            document.getElementById('mainControls').style.display = isOverview ? 'none' : '';
            
            if(tabName === 'DASHBOARD') {
                document.getElementById('dashboardFilters').classList.remove('hidden');
            } else {
                document.getElementById('dashboardFilters').classList.add('hidden');
            }
            // Ẩn nút Mở rộng/Thu gọn ở tab Dashboard (không có nhóm)
            let eb = document.getElementById('expandAllBtn');
            if(eb) {
                eb.style.display = (tabName === 'DASHBOARD') ? 'none' : '';
                eb.innerHTML = '⊕ Mở rộng';
            }
            // Nút Đánh số lại chỉ hiện ở các tab công ty (không phải Dashboard/Đã lưu trữ)
            let rb = document.getElementById('renumberBtn');
            if(rb) {
                rb.style.display = (tabName === 'DASHBOARD' || tabName === 'DONE') ? 'none' : '';
            }
            
            if(isOverview) {
                renderOverview();
            } else {
                renderView();
            }
        };

        function getProcessedTasks() {
            let showDone = (window.currentTab === 'DONE');
            let processed = JSON.parse(JSON.stringify(window.allTasks)); 
            processed = processed.filter(t => (t.archived === true) === showDone);
            
            if(window.currentTab !== 'DONE' && window.currentTab !== 'DASHBOARD') {
                processed = processed.filter(t => t.company === window.currentTab);
            }

            if(window.currentTab === 'DASHBOARD') {
                let fStatus = document.getElementById('filterStatus').value;
                if(fStatus === 'Complete') processed = processed.filter(t => t.progressSub == 100 || (t.status === 'Complete'));
                if(fStatus === 'Incomplete') processed = processed.filter(t => t.progressSub < 100 && t.status !== 'Complete');
            }

            processed.forEach(task => {
                if(task.taskId && task.taskId.includes('.')) {
                    task.progressSub = STATUS_MAP[task.status] !== undefined ? STATUS_MAP[task.status] : 0;
                }
            });

            processed.forEach(task => {
                if(!task.taskId.includes('.')) {
                    let subs = processed.filter(t => t.taskId.startsWith(task.taskId + '.'));
                    if(subs.length > 0) {
                        // Có sub -> tính trung bình tự động
                        let sum = 0;
                        subs.forEach(s => sum += s.progressSub);
                        let avg = Math.round(sum / subs.length);
                        task.progressSub = avg;
                        
                        if(avg === 0) task.status = 'Not Start';
                        else if(avg === 100) task.status = 'Complete';
                        else task.status = 'In Progress';
                    } else {
                        // KHÔNG có sub -> Main Task đứng một mình, dùng trạng thái đã lưu của chính nó
                        task.progressSub = STATUS_MAP[task.status] !== undefined ? STATUS_MAP[task.status] : 0;
                    }
                }
            });
            return processed;
        }

        function getStatusPill(status) {
            if(status === 'Complete') return '<span class="bg-[#d1fae5] text-[#047857] px-3 py-1 rounded-full text-[11px] font-bold">Complete</span>';
            if(status === 'In Progress') return '<span class="bg-[#fef3c7] text-[#b45309] px-3 py-1 rounded-full text-[11px] font-bold">In Progress</span>';
            if(status === 'Pending') return '<span class="bg-[#ffe4e6] text-[#be123c] px-3 py-1 rounded-full text-[11px] font-bold">Pending</span>';
            return '<span class="bg-[#f1f5f9] text-[#475569] px-3 py-1 rounded-full text-[11px] font-bold">Not Start</span>';
        }
        function getGanttClass(status) {
            if(status === 'Complete') return 'gantt-complete';
            if(status === 'In Progress') return 'gantt-inprogress';
            if(status === 'Pending') return 'gantt-pending';
            return 'gantt-notstart';
        }

        // ===== OVERVIEW DASHBOARD =====
        window.overviewCalMonth = null; // Date đại diện tháng đang xem trên lịch

        const STATUS_COLORS = {
            'Complete':    { dot: '#10b981', bg: '#d1fae5', text: '#047857', label: 'Hoàn thành' },
            'In Progress': { dot: '#f59e0b', bg: '#fef3c7', text: '#b45309', label: 'Đang làm' },
            'Pending':     { dot: '#f43f5e', bg: '#ffe4e6', text: '#be123c', label: 'Tạm hoãn' },
            'Not Start':   { dot: '#94a3b8', bg: '#f1f5f9', text: '#475569', label: 'Chưa bắt đầu' }
        };

        // Lấy tất cả main task chưa lưu trữ (mọi công ty) — dùng cho tổng quan
        function getOverviewTasks() {
            let all = JSON.parse(JSON.stringify(window.allTasks)).filter(t => t.archived !== true);
            // Tính trạng thái main từ sub (giống getProcessedTasks nhưng cho toàn bộ)
            let mains = all.filter(t => !t.taskId.includes('.'));
            mains.forEach(m => {
                let subs = all.filter(s => s.company === m.company && s.taskId.startsWith(m.taskId + '.'));
                if(subs.length > 0) {
                    let sum = 0;
                    subs.forEach(s => sum += (STATUS_MAP[s.status] !== undefined ? STATUS_MAP[s.status] : 0));
                    let avg = Math.round(sum / subs.length);
                    m.status = avg === 0 ? 'Not Start' : avg === 100 ? 'Complete' : 'In Progress';
                }
            });
            return mains;
        }

        window.renderOverview = function() {
            const container = document.getElementById('overviewDashboard');
            let mains = getOverviewTasks();

            // Đếm theo trạng thái
            let counts = { 'Complete': 0, 'In Progress': 0, 'Pending': 0, 'Not Start': 0 };
            mains.forEach(m => { if(counts[m.status] !== undefined) counts[m.status]++; });
            let total = mains.length || 1;

            // Đếm quá hạn (due < hôm nay & chưa hoàn thành)
            let today = new Date(); today.setHours(0,0,0,0);
            let overdueCount = mains.filter(m => {
                if(m.status === 'Complete' || !m.dueDate) return false;
                let d = parseLocalDate(m.dueDate); d.setHours(0,0,0,0);
                return d < today;
            }).length;

            // Việc sắp/quá hạn: sắp xếp theo due date, chưa hoàn thành, lấy 6
            let upcoming = mains.filter(m => m.status !== 'Complete' && m.dueDate)
                .sort((a,b) => parseLocalDate(a.dueDate) - parseLocalDate(b.dueDate))
                .slice(0, 6);

            if(!window.overviewCalMonth) window.overviewCalMonth = new Date(today.getFullYear(), today.getMonth(), 1);

            container.innerHTML = `
                <div class="dash-grid">
                    ${renderHeroCard(counts['In Progress'], mains.length)}
                    ${renderStatCard(counts, overdueCount)}
                    ${renderDonutCard(counts, total)}
                    ${renderUpcomingCard(upcoming, today)}
                    ${renderCalendarCard(mains)}
                </div>
            `;
        };

        function renderHeroCard(inProgress, totalOpen) {
            return `
                <div class="dash-card hero-card">
                    <div class="hero-label">🔥 Công việc đang chạy</div>
                    <div class="hero-number">${inProgress}</div>
                    <div class="hero-sub">trên tổng ${totalOpen} công việc đang mở</div>
                </div>`;
        }

        function renderStatCard(counts, overdue) {
            return `
                <div class="dash-card stat-card">
                    <div class="stat-row">
                        <div class="stat-mini">
                            <div class="stat-mini-num" style="color:#10b981">${counts['Complete']}</div>
                            <div class="stat-mini-label">Hoàn thành</div>
                        </div>
                        <div class="stat-mini">
                            <div class="stat-mini-num" style="color:#94a3b8">${counts['Not Start']}</div>
                            <div class="stat-mini-label">Chưa bắt đầu</div>
                        </div>
                    </div>
                    <div class="stat-row" style="margin-top:14px">
                        <div class="stat-mini">
                            <div class="stat-mini-num" style="color:#f43f5e">${counts['Pending']}</div>
                            <div class="stat-mini-label">Tạm hoãn</div>
                        </div>
                        <div class="stat-mini" style="${overdue > 0 ? 'background:#fef2f2' : ''}">
                            <div class="stat-mini-num" style="color:#dc2626">${overdue}</div>
                            <div class="stat-mini-label">Quá hạn</div>
                        </div>
                    </div>
                </div>`;
        }

        function renderDonutCard(counts, total) {
            // Vẽ donut bằng conic-gradient
            let order = ['Complete', 'In Progress', 'Pending', 'Not Start'];
            let acc = 0, stops = [], legend = '';
            order.forEach(st => {
                let c = counts[st];
                let pct = (c / total) * 100;
                let start = acc, end = acc + pct;
                if(c > 0) stops.push(`${STATUS_COLORS[st].dot} ${start}% ${end}%`);
                acc = end;
                legend += `
                    <div class="legend-item">
                        <div class="legend-left"><span class="legend-dot" style="background:${STATUS_COLORS[st].dot}"></span>${STATUS_COLORS[st].label}</div>
                        <div class="legend-val">${c} <span style="color:#94a3b8;font-weight:600">(${pct.toFixed(0)}%)</span></div>
                    </div>`;
            });
            let gradient = stops.length ? `conic-gradient(${stops.join(', ')})` : '#f1f5f9';
            let totalTasks = counts['Complete'] + counts['In Progress'] + counts['Pending'] + counts['Not Start'];
            return `
                <div class="dash-card donut-card">
                    <div class="dash-card-title">📊 Phân bổ trạng thái</div>
                    <div class="donut-wrap">
                        <div style="position:relative;width:150px;height:150px;flex-shrink:0">
                            <div style="width:150px;height:150px;border-radius:50%;background:${gradient}"></div>
                            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:92px;height:92px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center">
                                <div style="font-size:26px;font-weight:800;color:#1e293b;line-height:1">${totalTasks}</div>
                                <div style="font-size:10px;color:#64748b;font-weight:600">công việc</div>
                            </div>
                        </div>
                        <div class="donut-legend">${legend}</div>
                    </div>
                </div>`;
        }

        function renderUpcomingCard(upcoming, today) {
            let items = '';
            if(upcoming.length === 0) {
                items = `<div style="text-align:center;color:#94a3b8;padding:24px;font-size:13px">Không có công việc nào sắp đến hạn 🎉</div>`;
            } else {
                upcoming.forEach(m => {
                    let d = parseLocalDate(m.dueDate); d.setHours(0,0,0,0);
                    let diff = Math.round((d - today) / 86400000);
                    let isOverdue = diff < 0;
                    let badgeTxt, badgeStyle, icon, iconBg;
                    if(isOverdue) {
                        badgeTxt = `Trễ ${Math.abs(diff)} ngày`; badgeStyle = 'background:#fee2e2;color:#dc2626';
                        icon = '⚠️'; iconBg = '#fee2e2';
                    } else if(diff === 0) {
                        badgeTxt = 'Hôm nay'; badgeStyle = 'background:#fef3c7;color:#b45309';
                        icon = '📌'; iconBg = '#fef3c7';
                    } else if(diff <= 3) {
                        badgeTxt = `Còn ${diff} ngày`; badgeStyle = 'background:#fef3c7;color:#b45309';
                        icon = '⏰'; iconBg = '#fef3c7';
                    } else {
                        badgeTxt = `Còn ${diff} ngày`; badgeStyle = 'background:#dbeafe;color:#2563eb';
                        icon = '📅'; iconBg = '#dbeafe';
                    }
                    items += `
                        <div class="up-item ${isOverdue ? 'overdue' : ''}">
                            <div class="up-icon" style="background:${iconBg}">${icon}</div>
                            <div class="up-body">
                                <div class="up-name">${m.name}</div>
                                <div class="up-meta">${m.company} · Hạn: ${formatDMY(m.dueDate)}</div>
                            </div>
                            <div class="up-badge" style="${badgeStyle}">${badgeTxt}</div>
                        </div>`;
                });
            }
            return `
                <div class="dash-card upcoming-card">
                    <div class="dash-card-title">⏰ Việc sắp & quá hạn</div>
                    ${items}
                </div>`;
        }

        function formatDMY(str) {
            let d = parseLocalDate(str);
            return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
        }

        function renderCalendarCard(mains) {
            let cm = window.overviewCalMonth;
            let year = cm.getFullYear(), month = cm.getMonth();
            let today = new Date(); today.setHours(0,0,0,0);
            let monthNames = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];

            // Gom việc theo ngày due (trong tháng đang xem)
            let byDay = {};
            mains.forEach(m => {
                if(!m.dueDate) return;
                let d = parseLocalDate(m.dueDate);
                if(d.getFullYear() === year && d.getMonth() === month) {
                    let key = d.getDate();
                    (byDay[key] = byDay[key] || []).push(m);
                }
            });

            let firstDay = new Date(year, month, 1);
            let startWeekday = (firstDay.getDay() + 6) % 7; // Thứ 2 = 0
            let daysInMonth = new Date(year, month + 1, 0).getDate();
            let prevMonthDays = new Date(year, month, 0).getDate();

            let dows = ['T2','T3','T4','T5','T6','T7','CN'];
            let cells = '';
            dows.forEach(d => cells += `<div class="cal-dow">${d}</div>`);

            let totalCells = Math.ceil((startWeekday + daysInMonth) / 7) * 7;
            for(let i = 0; i < totalCells; i++) {
                let dayNum, cls = 'cal-cell', isCurrentMonth = true;
                if(i < startWeekday) {
                    dayNum = prevMonthDays - startWeekday + i + 1; cls += ' other'; isCurrentMonth = false;
                } else if(i >= startWeekday + daysInMonth) {
                    dayNum = i - startWeekday - daysInMonth + 1; cls += ' other'; isCurrentMonth = false;
                } else {
                    dayNum = i - startWeekday + 1;
                    let cellDate = new Date(year, month, dayNum);
                    if(cellDate.getTime() === today.getTime()) cls += ' today';
                }
                let taskHtml = '';
                if(isCurrentMonth && byDay[dayNum]) {
                    let dayTasks = byDay[dayNum];
                    dayTasks.slice(0, 2).forEach(m => {
                        let col = STATUS_COLORS[m.status] || STATUS_COLORS['Not Start'];
                        taskHtml += `<div class="cal-task" style="background:${col.bg};color:${col.text}" title="${m.name}">${m.name}</div>`;
                    });
                    if(dayTasks.length > 2) taskHtml += `<div class="cal-more">+${dayTasks.length - 2} việc</div>`;
                }
                cells += `<div class="${cls}"><div class="cal-date">${dayNum}</div>${taskHtml}</div>`;
            }

            return `
                <div class="dash-card cal-card">
                    <div class="cal-head">
                        <div class="dash-card-title" style="margin-bottom:0">📅 Lịch công việc</div>
                        <div style="display:flex;align-items:center;gap:12px">
                            <button class="cal-nav-btn" onclick="changeCalMonth(-1)">‹</button>
                            <span style="font-weight:800;font-size:14px;color:#1e293b;min-width:130px;text-align:center">${monthNames[month]} ${year}</span>
                            <button class="cal-nav-btn" onclick="changeCalMonth(1)">›</button>
                        </div>
                    </div>
                    <div class="cal-grid">${cells}</div>
                </div>`;
        }

        window.changeCalMonth = function(delta) {
            let cm = window.overviewCalMonth;
            window.overviewCalMonth = new Date(cm.getFullYear(), cm.getMonth() + delta, 1);
            renderOverview();
        };

        window.renderView = function() {
            let isDashboard = (window.currentTab === 'DASHBOARD');
            let isDoneTab = (window.currentTab === 'DONE');
            let tasks = getProcessedTasks();
            
            const thead = document.getElementById('mainHead');
            const tbody = document.getElementById('mainBody');
            thead.innerHTML = ''; tbody.innerHTML = '';
            
            if(tasks.length === 0) { 
                tbody.innerHTML = `<tr><td colspan="100%" class="text-center py-12 text-[#64748b] text-sm">Danh sách trống. Tạo công việc mới để bắt đầu.</td></tr>`; 
                return; 
            }

            // GROUP: lần đầu vào 1 tab -> mặc định thu gọn tất cả nhóm.
            // Dashboard xem toàn cảnh nên luôn mở rộng (không thu gọn).
            let enableGroup = !isDashboard;
            if(enableGroup && !window.groupsInitialized[window.currentTab]) {
                tasks.forEach(t => {
                    if(!t.taskId.includes('.')) {
                        window.collapsedGroups[window.currentTab + ':' + t.taskId] = true;
                    }
                });
                window.groupsInitialized[window.currentTab] = true;
            }

            let today = new Date();
            today.setHours(0,0,0,0);

            let minDate = new Date("2099-12-31");
            let maxDate = new Date("1900-01-01");
            let fStart = isDashboard ? document.getElementById('filterStart').value : null;
            let fEnd = isDashboard ? document.getElementById('filterEnd').value : null;

            if(fStart) minDate = parseLocalDate(fStart);
            if(fEnd) maxDate = parseLocalDate(fEnd);

            if(!fStart || !fEnd) {
                tasks.forEach(t => {
                    let s = t.startDate ? parseLocalDate(t.startDate) : null;
                    let d = t.dueDate ? parseLocalDate(t.dueDate) : null;
                    if(!fStart && s && s < minDate) minDate = s;
                    if(!fEnd && d && d > maxDate) maxDate = d;
                });
            }
            // Chuẩn hóa min/max về 00:00 để mọi ô Gantt khớp giờ với ngày task (tô đúng cả ngày due date)
            minDate.setHours(0,0,0,0);
            maxDate.setHours(0,0,0,0);
            if(minDate > maxDate) { minDate = new Date(); maxDate = new Date(); }
            
            if(today < minDate && !fStart) minDate = new Date(today);
            if(today > maxDate && !fEnd) maxDate = new Date(today);
            minDate.setHours(0,0,0,0);
            maxDate.setHours(0,0,0,0);

            let dateRange = [];
            let curr = new Date(minDate);
            curr.setHours(0,0,0,0);
            while(curr <= maxDate) { let cd = new Date(curr); cd.setHours(0,0,0,0); dateRange.push(cd); curr.setDate(curr.getDate() + 1); }

            let showCompCol = (isDashboard || isDoneTab);
            let trDay = `<tr>`;
            if(showCompCol) trDay += `<th rowspan="2" class="sticky-col">Cty</th>`;
            
            trDay += `<th rowspan="2" class="w-16">#</th>
                      <th rowspan="2" class="task-name-col">Task Name</th>
                      <th rowspan="2" class="w-24">Bắt Đầu</th>
                      <th rowspan="2" class="w-24">Kết Thúc</th>
                      <th rowspan="2" class="w-12">Ngày</th>
                      <th rowspan="2" class="w-28">Status</th>
                      <th rowspan="2" class="w-16">%</th>
                      <th rowspan="2" class="w-16">Hành động</th>`;
                      
            let trDate = `<tr>`;
            dateRange.forEach(d => {
                let isW = (d.getDay()===0 || d.getDay()===6) ? "bg-weekend-head" : "";
                let isT = (d.getTime() === today.getTime()) ? "today-head" : "";
                trDay += `<th class="gantt-cell ${isW} ${isT}">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()]}</th>`;
                trDate += `<th class="gantt-cell ${isW} ${isT}">${d.getDate() + "/" + (d.getMonth()+1)}</th>`;
            });
            thead.innerHTML = trDay + "</tr>" + trDate + "</tr>";

            let lastMainId = null;
            
            // Đếm số sub-task cho mỗi main (để hiển thị trên nút thu gọn)
            let subCounts = {};
            tasks.forEach(t => {
                if(t.taskId.includes('.')) {
                    let mid = t.taskId.split('.')[0];
                    subCounts[mid] = (subCounts[mid] || 0) + 1;
                }
            });
            
            tasks.forEach(task => {
                let currentMainId = task.taskId.split('.')[0];
                let isMain = !task.taskId.includes('.');
                let groupKey = window.currentTab + ':' + currentMainId;
                let isCollapsed = enableGroup && window.collapsedGroups[groupKey] === true;
                
                // Nếu là sub-task và nhóm đang thu gọn -> bỏ qua, không render
                if(!isMain && isCollapsed) { return; }
                
                // CHÈN KHOẢNG TRẮNG GIỮA CÁC MAIN TASK (Yêu cầu làm rõ phân cách)
                if(isMain && lastMainId !== null && currentMainId !== lastMainId) {
                    tbody.innerHTML += `<tr class="spacer-row"><td colspan="100%"></td></tr>`;
                }
                if(isMain) lastMainId = currentMainId;

                let sDate = task.startDate ? parseLocalDate(task.startDate) : null;
                if(sDate) sDate.setHours(0,0,0,0);
                let dDate = task.dueDate ? parseLocalDate(task.dueDate) : null;
                if(dDate) dDate.setHours(0,0,0,0);
                
                let daysCount = (sDate && dDate) ? Math.round((dDate - sDate) / 86400000) + 1 : '';
                let sShow = sDate ? ("0"+sDate.getDate()).slice(-2)+"/"+("0"+(sDate.getMonth()+1)).slice(-2)+"/"+sDate.getFullYear() : '';
                let dShow = dDate ? ("0"+dDate.getDate()).slice(-2)+"/"+("0"+(dDate.getMonth()+1)).slice(-2)+"/"+dDate.getFullYear() : '';

                let stPill = getStatusPill(task.status);
                let stGanttClass = getGanttClass(task.status);
                
                // THIẾT KẾ BADGE KHOANH TRÒN CHO MAIN TASK
                let badge = isMain 
                    ? `<div class="w-7 h-7 mx-auto rounded-full bg-[#007aff] text-white flex items-center justify-center text-[11px] font-bold shadow-md">${task.taskId}</div>` 
                    : `<span class="text-[#64748b] text-[12px] font-bold">${task.taskId}</span>`;

                let indent = isMain ? 'font-bold text-[13px] text-[#1e293b]' : 'pl-8 text-[#475569]';
                
                // Nút thu gọn/mở rộng nhóm (chỉ main task có sub, và không ở dashboard)
                let hasSubs = subCounts[currentMainId] > 0;
                let groupToggle = '';
                if(isMain && enableGroup && hasSubs) {
                    let collapsedCls = isCollapsed ? 'collapsed' : '';
                    let cnt = subCounts[currentMainId];
                    groupToggle = `<span class="group-toggle ${collapsedCls}" onclick="toggleGroup('${currentMainId}')" title="${isCollapsed ? 'Mở rộng' : 'Thu gọn'} ${cnt} công việc con"><span class="chev">▼</span></span>`;
                }
                
                // Khung Hành Động - Dropdown Menu
                let actionMenuId = `menu-${task.dbKey}`;
                let actionBtns = `
                    <div class="action-menu-wrapper">
                        <button class="action-menu-trigger" onclick="toggleActionMenu('${actionMenuId}')" title="Tùy chọn">⋮</button>
                        <div class="action-menu" id="${actionMenuId}">`;
                
                // Always show Edit & Delete
                actionBtns += `<button class="action-menu-item edit" onclick="editTask('${task.dbKey}')" title="Chỉnh sửa">
                                <span class="action-menu-icon">✏️</span>
                                <span>Sửa</span>
                              </button>`;
                actionBtns += `<button class="action-menu-item delete" onclick="deleteTask('${task.dbKey}', '${task.taskId}')" title="Xóa">
                                <span class="action-menu-icon">🗑️</span>
                                <span>Xóa</span>
                              </button>`;
                
                // Show Add Sub & Archive only for Main Tasks
                if(isMain && !isDoneTab) {
                    actionBtns += `<button class="action-menu-item add" onclick="openModal('${task.taskId}')" title="Thêm Sub-task">
                                    <span class="action-menu-icon">➕</span>
                                    <span>Thêm Sub</span>
                                  </button>`;
                    actionBtns += `<button class="action-menu-item archive" onclick="archiveTask('${task.taskId}', '${task.company}')" title="Lưu trữ">
                                    <span class="action-menu-icon">📥</span>
                                    <span>Lưu trữ</span>
                                  </button>`;
                }
                if(isMain && isDoneTab) { 
                    actionBtns += `<div class="action-menu-item archived">
                                    <span class="action-menu-icon">✅</span>
                                    <span>Đã Lưu</span>
                                  </div>`; 
                }
                
                actionBtns += `</div></div>`;

                let rowHtml = `<tr class="hover:bg-[#f9f9f9] transition-colors">`;
                if(showCompCol) rowHtml += `<td class="sticky-col bg-white text-center font-bold text-[#64748b]">${task.company}</td>`;
                
                rowHtml += `
                    <td class="text-center">${badge}</td>
                    <td class="task-name-col ${indent}">${isMain ? groupToggle : '<span class="text-[#cbd5e1] mr-1">↳</span>'}${task.name}</td>
                    <td class="text-center text-[#475569] font-medium">${sShow}</td>
                    <td class="text-center text-[#475569] font-medium">${dShow}</td>
                    <td class="text-center font-bold text-[#64748b]">${daysCount}</td>
                    <td class="text-center">${stPill}</td>
                    <td class="text-center font-bold text-[#1e293b]">${task.progressSub}%</td>
                    <td class="text-center whitespace-nowrap">${actionBtns}</td>`;

                // VẼ Ô GANTT
                dateRange.forEach(d => {
                    let dTime = d.getTime();
                    let isTaskDay = (sDate && dDate && dTime >= sDate.getTime() && dTime <= dDate.getTime());
                    let isT = (dTime === today.getTime()) ? "today-col" : "";
                    
                    let cellClass = isTaskDay ? stGanttClass : ((d.getDay()===0 || d.getDay()===6) ? "bg-weekend-body" : "");
                    rowHtml += `<td class="gantt-cell ${cellClass} ${isT}"></td>`;
                });
                
                tbody.innerHTML += rowHtml + `</tr>`;
            });
        }

        window.quickAddMainTask = function() {
            let comp = document.getElementById('q_company').value;
            let name = document.getElementById('q_name').value.trim();
            let start = document.getElementById('q_start').value;
            let due = document.getElementById('q_due').value;

            if(!name || !start || !due) { alert("Vui lòng nhập Tên, Ngày bắt đầu và kết thúc!"); return; }

            let newId = getNextTaskId(comp, null);
            push(tasksRef, { company: comp, taskId: newId, name: name, startDate: start, dueDate: due, status: "Not Start", archived: false });

            document.getElementById('q_name').value = ''; document.getElementById('q_start').value = ''; document.getElementById('q_due').value = '';
            switchTab(comp); 
        }

        window.archiveTask = function(taskId, comp) {
            if(confirm("Lưu công việc này? (Nó và các Sub-task sẽ được chuyển qua tab LƯU TRỮ)")) {
                let toArchive = window.allTasks.filter(t => t.company === comp && (t.taskId === taskId || t.taskId.startsWith(taskId + '.')));
                toArchive.forEach(t => { update(ref(db, 'tasks/' + t.dbKey), { archived: true }); });
            }
            window.closeAllMenus();
        }

        // ĐÁNH SỐ LẠI: nén taskId của các công việc CHÍNH (chưa lưu trữ) về 1,2,3...
        // liên tục theo thứ tự hiện hành. Sub-task đi theo main tương ứng (4.1 -> 1.1).
        window.renumberTasks = function() {
            let comp = window.currentTab;
            if(comp === 'DASHBOARD' || comp === 'DONE') {
                alert("Chức năng đánh số lại chỉ dùng cho các tab công ty (SVL, SGV, SVN, Cá nhân).");
                return;
            }
            
            // Lấy các main task chưa lưu trữ của tab hiện tại, theo thứ tự số hiện có
            let mains = window.allTasks
                .filter(t => t.company === comp && !t.taskId.includes('.') && t.archived !== true)
                .sort((a, b) => parseInt(a.taskId) - parseInt(b.taskId));
            
            if(mains.length === 0) { alert("Không có công việc nào để đánh số lại."); return; }
            
            // Tính các thay đổi cần thiết
            let updates = {};   // dbKey -> newTaskId
            let changeCount = 0;
            
            mains.forEach((main, idx) => {
                let newMainId = (idx + 1).toString();
                if(main.taskId !== newMainId) {
                    updates[main.dbKey] = newMainId;
                    changeCount++;
                }
                // Đổi luôn các sub của main này
                let subs = window.allTasks
                    .filter(t => t.company === comp && t.archived !== true && t.taskId.startsWith(main.taskId + '.'))
                    .sort((a, b) => parseInt(a.taskId.split('.')[1]) - parseInt(b.taskId.split('.')[1]));
                
                subs.forEach((sub, sIdx) => {
                    let newSubId = newMainId + '.' + (sIdx + 1);
                    if(sub.taskId !== newSubId) {
                        updates[sub.dbKey] = newSubId;
                        changeCount++;
                    }
                });
            });
            
            if(changeCount === 0) {
                alert("Số thứ tự đã liên tục, không cần đánh số lại.");
                window.closeAllMenus();
                return;
            }
            
            if(!confirm(`Đánh số lại ${mains.length} công việc chính của tab ${comp}?\n(${changeCount} mã sẽ được cập nhật: 1, 2, 3...)\n\nLưu ý: thao tác này ghi đè mã công việc trong dữ liệu.`)) {
                return;
            }
            
            // Ghi đè taskId lên Firebase
            let promises = [];
            for(let dbKey in updates) {
                promises.push(update(ref(db, 'tasks/' + dbKey), { taskId: updates[dbKey] }));
            }
            
            // Reset trạng thái nhóm thu gọn của tab này (vì id đã đổi)
            Object.keys(window.collapsedGroups).forEach(k => {
                if(k.startsWith(comp + ':')) delete window.collapsedGroups[k];
            });
            window.groupsInitialized[comp] = false;
            
            Promise.all(promises).then(() => {
                console.log('Đánh số lại xong:', changeCount, 'mã cập nhật');
            }).catch(err => {
                console.error('Lỗi khi đánh số lại:', err);
                alert("Có lỗi khi đánh số lại. Vui lòng thử lại.");
            });
            
            window.closeAllMenus();
        };

        function getNextTaskId(company, parentId = null) {
            let compTasks = window.allTasks.filter(t => t.company === company && t.archived !== true);
            if(!parentId) { 
                let mains = compTasks.filter(t => !t.taskId.includes('.'));
                if(mains.length === 0) return "1";
                let max = Math.max(...mains.map(t => parseInt(t.taskId)));
                return (max + 1).toString();
            } else { 
                let subs = compTasks.filter(t => t.taskId.startsWith(parentId + '.'));
                if(subs.length === 0) return parentId + ".1";
                let max = Math.max(...subs.map(t => parseInt(t.taskId.split('.')[1])));
                return parentId + "." + (max + 1).toString();
            }
        }

        window.openModal = function(parentId = null) {
            window.modalState = { mode: 'ADD', parentId: parentId, dbKey: null, isMain: !parentId };
            document.getElementById('modalTitle').innerText = `Thêm Sub-task (Tạo cho ID: ${parentId})`;
            document.getElementById('m_name').value = ''; document.getElementById('m_start').value = ''; document.getElementById('m_due').value = ''; document.getElementById('m_status').value = 'Not Start';
            
            document.getElementById('statusControlBox').classList.remove('hidden');
            document.getElementById('mainTaskWarning').classList.add('hidden');
            document.getElementById('taskModal').classList.remove('hidden');
            window.closeAllMenus();
        };

        window.editTask = function(dbKey) {
            let task = window.allTasks.find(t => t.dbKey === dbKey);
            if(!task) return;
            let isMain = !task.taskId.includes('.');
            
            // Kiểm tra Main Task này có sub-task nào không (bỏ qua các task đã lưu trữ khác trạng thái)
            let hasSubs = false;
            if(isMain) {
                hasSubs = window.allTasks.some(t =>
                    t.company === task.company &&
                    t.archived === task.archived &&
                    t.taskId.startsWith(task.taskId + '.')
                );
            }
            // Main Task KHÔNG có sub -> cho phép chỉnh trạng thái trực tiếp (coi như task đơn)
            let allowStatusEdit = !isMain || !hasSubs;
            
            window.modalState = { mode: 'EDIT', parentId: null, dbKey: dbKey, isMain: isMain, allowStatusEdit: allowStatusEdit };
            
            document.getElementById('modalTitle').innerText = `Chỉnh sửa Task ${task.taskId}`;
            document.getElementById('m_name').value = task.name; document.getElementById('m_start').value = task.startDate; document.getElementById('m_due').value = task.dueDate; document.getElementById('m_status').value = task.status;
            
            if(allowStatusEdit) {
                // Task đơn (sub, hoặc main không có sub) -> hiện ô chọn trạng thái
                document.getElementById('statusControlBox').classList.remove('hidden');
                document.getElementById('mainTaskWarning').classList.add('hidden');
                document.getElementById('mainTaskWarning').classList.remove('flex');
            } else {
                // Main task CÓ sub -> trạng thái tự tính, ẩn ô chọn + hiện cảnh báo
                document.getElementById('statusControlBox').classList.add('hidden');
                document.getElementById('mainTaskWarning').classList.remove('hidden');
                document.getElementById('mainTaskWarning').classList.add('flex');
            }
            document.getElementById('taskModal').classList.remove('hidden');
            window.closeAllMenus();
        };

        window.closeModal = function() { document.getElementById('taskModal').classList.add('hidden'); };

        window.saveTaskModal = function() {
            let nName = document.getElementById('m_name').value; let nStart = document.getElementById('m_start').value; let nDue = document.getElementById('m_due').value; let nStatus = document.getElementById('m_status').value;
            if(!nName || !nStart || !nDue) return alert('Vui lòng nhập đủ Tên và Ngày tháng!');

            let payload = { name: nName, startDate: nStart, dueDate: nDue };
            // Lưu trạng thái nếu là task đơn (sub, hoặc main không có sub)
            if(window.modalState.allowStatusEdit) payload.status = nStatus;

            if(window.modalState.mode === 'ADD') {
                payload.company = window.currentTab; payload.taskId = getNextTaskId(window.currentTab, window.modalState.parentId); payload.archived = false;
                push(tasksRef, payload);
            } else if (window.modalState.mode === 'EDIT') { update(ref(db, 'tasks/' + window.modalState.dbKey), payload); }
            closeModal();
        };

        // ACTION MENU FUNCTIONS
        window.closeAllMenus = function() {
            document.querySelectorAll('.action-menu').forEach(menu => {
                menu.classList.remove('show');
                if (menu.previousElementSibling) {
                    menu.previousElementSibling.classList.remove('active');
                }
            });
        };
        
        window.toggleActionMenu = function(menuId) {
            const menu = document.getElementById(menuId);
            const trigger = menu.previousElementSibling;
            
            // Close all other menus
            document.querySelectorAll('.action-menu').forEach(m => {
                if (m.id !== menuId) {
                    m.classList.remove('show');
                    m.classList.remove('open-up');
                    m.previousElementSibling.classList.remove('active');
                }
            });
            
            const willOpen = !menu.classList.contains('show');
            
            // Nếu sắp mở: kiểm tra còn đủ chỗ bên dưới không, nếu không thì mở lên trên
            if(willOpen) {
                const rect = trigger.getBoundingClientRect();
                const spaceBelow = window.innerHeight - rect.bottom;
                // menu cao ~ số item * 40px; ước lượng 180px là đủ an toàn
                const menuHeight = 190;
                if(spaceBelow < menuHeight && rect.top > menuHeight) {
                    menu.classList.add('open-up');
                } else {
                    menu.classList.remove('open-up');
                }
            }
            
            // Toggle current menu
            menu.classList.toggle('show');
            trigger.classList.toggle('active');
        };
        
        // GROUP: thu gọn / mở rộng nhóm công việc con
        window.toggleGroup = function(mainId) {
            let key = window.currentTab + ':' + mainId;
            window.collapsedGroups[key] = !window.collapsedGroups[key];
            renderView();
        };
        
        // Mở rộng / thu gọn tất cả nhóm trong tab hiện tại
        window.toggleAllGroups = function(collapse) {
            let tasks = getProcessedTasks();
            tasks.forEach(t => {
                if(!t.taskId.includes('.')) {
                    window.collapsedGroups[window.currentTab + ':' + t.taskId] = collapse;
                }
            });
            renderView();
        };
        
        // Nút Mở rộng/Thu gọn tất cả — tự đổi trạng thái
        window.toggleExpandAll = function() {
            // Kiểm tra: nếu còn ít nhất 1 nhóm đang thu gọn -> mở rộng hết; ngược lại thu gọn hết
            let tasks = getProcessedTasks();
            let anyCollapsed = tasks.some(t =>
                !t.taskId.includes('.') &&
                window.collapsedGroups[window.currentTab + ':' + t.taskId] === true
            );
            toggleAllGroups(!anyCollapsed);
            let btn = document.getElementById('expandAllBtn');
            if(btn) btn.innerHTML = anyCollapsed ? '⊖ Thu gọn' : '⊕ Mở rộng';
        };
        
        // ========================================
        // PWA SERVICE WORKER REGISTRATION
        // ========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registered:', registration);
                        
                        // Check for updates periodically
                        setInterval(() => {
                            registration.update();
                        }, 60000); // Check every minute
                        
                        // Listen for updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // New version available
                                    console.log('New version available!');
                                    // Optionally show update notification
                                }
                            });
                        });
                    })
                    .catch(error => console.log('Service Worker registration failed:', error));
            });
            
            // Handle updates from service worker
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log('Service Worker controller changed - app updated!');
            });
        }
        
        // ========================================
        // PWA INSTALL PROMPT
        // ========================================
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the mini-infobar from appearing
            e.preventDefault();
            // Stash the event for later use
            deferredPrompt = e;
            console.log('Install prompt ready');
        });
        
        // Optional: Add install button functionality
        window.installApp = function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('App installed!');
                    }
                    deferredPrompt = null;
                });
            }
        };
        
        // Detect if running as standalone app
        if (window.navigator.standalone === true) {
            console.log('Running as standalone PWA');
            document.documentElement.classList.add('standalone');
        }
        
        // Handle app visibility changes (when switching apps)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                console.log('App backgrounded');
            } else {
                console.log('App foregrounded - syncing data');
                // Trigger any pending syncs
            }
        });
    </script>
</body>
</html>
