<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    
    <!-- App Manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#3b82f6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1e293b" media="(prefers-color-scheme: dark)">
    
    <!-- iOS App Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Work Plan">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Android App Configuration -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Master Work Plan">
    
    <!-- General Meta Tags -->
    <meta name="description" content="Professional Gantt chart & work planning app with real-time sync. Plan, track, and manage projects efficiently on any device.">
    <meta name="keywords" content="gantt chart, work planning, project management, productivity">
    <meta name="author" content="Master Work Plan">
    <meta name="robots" content="index, follow">
    
    <!-- Disable unwanted zoom and tap highlights on mobile -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Master Work Plan - Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Phông chữ chuẩn Apple */
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 12px; background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%); color: #1e293b; }
        
        /* Bảng thiết kế hiện đại - Responsive */
        table { border-collapse: separate; border-spacing: 0; width: 100%; white-space: nowrap; }
        th, td { border-bottom: 1px solid #e2e8f0; padding: 10px 10px; text-align: left; vertical-align: middle; }
        
        /* Header bảng trong suốt có làm mờ (Backdrop Blur) - Prettier & Sticky */
        th { 
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 248, 250, 0.95) 100%); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            color: #475569; 
            text-align: center; 
            font-weight: 800; 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 0.06em; 
            border-bottom: 2px solid #e2e8f0; 
            position: sticky; 
            top: 0; 
            z-index: 20;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
        }
        
        /* Zoom Controls - Inline Style */
        .zoom-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 11px;
            font-weight: 600;
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            padding: 10px 16px;
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .zoom-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.3);
            min-width: 36px;
        }
        
        .zoom-btn:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);
        }
        
        .zoom-btn:active {
            transform: translateY(0);
        }
        
        .zoom-btn-fit {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 2px 6px rgba(16, 185, 129, 0.3);
            font-weight: 700;
            font-size: 10px;
            min-width: 38px;
        }
        
        .zoom-btn-fit:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.4);
        }
        
        .zoom-display {
            color: #1e293b;
            font-weight: 700;
            min-width: 50px;
            text-align: center;
            font-size: 12px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            padding: 4px 10px;
            border-radius: 6px;
        }
        
        /* Header Control Container */
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        /* Table Wrapper with Zoom */
        #tableWrapper {
            transform-origin: top left;
            transition: transform 0.3s ease;
        }
        .text-center { text-align: center; }
        
        /* Thu gọn cột Task Name - Responsive */
        .task-name-col { min-width: 180px; max-width: 240px; white-space: normal; word-wrap: break-word; line-height: 1.4; font-size: 12px; }
        
        /* Màu sắc Gantt tươi trẻ - Compact */
        .gantt-cell { 
            border-right: 1px solid #f9f9f9; 
            border-left: 1px solid #f9f9f9;
            padding: 8px 6px !important;
            min-width: 32px;
            height: 40px;
        }
        .gantt-complete { background-color: #10b981 !important; } /* iOS Green */
        .gantt-inprogress { background-color: #f59e0b !important; } /* iOS Orange */
        .gantt-pending { background-color: #f43f5e !important; } /* iOS Red */
        .gantt-notstart { background-color: #e2e8f0 !important; } /* Gray */
        
        /* Mốc Today (Star indicator in cell) */
        .today-col { 
            background: linear-gradient(135deg, rgba(244, 63, 94, 0.12) 0%, rgba(244, 63, 94, 0.08) 100%) !important; 
            border-left: 2px solid #f43f5e !important; 
            border-right: 2px solid #f43f5e !important;
            box-shadow: inset 0 0 0 1px rgba(244, 63, 94, 0.15) !important;
            position: relative;
        }
        .today-col::before {
            content: "⭐";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            z-index: 5;
        }
        .today-head { 
            color: white !important; 
            font-weight: 900 !important; 
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%) !important; 
            border-bottom: 3px solid #f43f5e !important;
            position: relative;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .today-head::after {
            content: "";
        }
        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* Weekend styling - Bright & Vibrant */
        .bg-weekend-head { 
            background: linear-gradient(135deg, #fff4e6 0%, #ffe5cc 100%) !important; 
            color: #d97706 !important;
            font-weight: 800 !important;
            border-bottom: 3px solid #f59e0b !important;
        } 
        .bg-weekend-body { 
            background: linear-gradient(180deg, #f8f0f5 0%, #f8f0f5 100%) !important;
            border-left: 1px solid #fcd34d !important;
            border-right: 1px solid #fcd34d !important;
        } 
        
        /* Khung chứa bảng bo góc */
        .table-container { 
            overflow-x: auto; 
            max-width: 100%; 
            border: 1.5px solid #e2e8f0; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04); 
            border-radius: 18px; 
            background: white;
        }
        .sticky-col { 
            position: sticky; 
            left: 0; 
            background-color: rgba(255, 255, 255, 0.99); 
            z-index: 10; 
            border-right: 2px solid #e2e8f0;
            backdrop-filter: blur(8px);
        }
        th.sticky-col { z-index: 21; background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 248, 250, 0.95) 100%); }
        
        /* Input & Select phong cách iOS - Responsive */
        input, select { border: 1px solid #d2d2d7; padding: 8px 10px; border-radius: 8px; font-size: 12px; outline: none; background-color: #f8fafc; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: #2563eb; background-color: white; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1); }
        
        /* Tab Segmented Control - Professional Design */
        .tabs-container { 
            display: inline-flex; 
            background: transparent;
            padding: 0;
            border-radius: 12px;
            margin-bottom: 0;
            gap: 0;
            flex-wrap: wrap;
            border-bottom: 2px solid #e2e8f0;
            align-items: center;
        }
        
        .tab-btn { 
            padding: 10px 18px;
            font-weight: 700; 
            cursor: pointer; 
            color: #64748b; 
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            border-radius: 0;
            font-size: 11px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            position: relative;
            border: none;
            background: transparent;
            border-bottom: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            right: 0;
            height: 3px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        .tab-btn:hover:not(.active) { 
            color: #1e293b;
            background: rgba(15, 23, 42, 0.02);
            border-bottom-color: rgba(59, 130, 246, 0.2);
        }
        
        .tab-btn:hover:not(.active)::after {
            transform: scaleX(0.5);
        }
        
        .tab-btn.active { 
            background: transparent;
            color: #2563eb;
            border-bottom: 3px solid #2563eb;
            box-shadow: none;
            font-weight: 800;
        }
        
        /* Color coding for special tabs */
        #tab-DASHBOARD.active { 
            color: #7c3aed; 
            border-bottom-color: #7c3aed; 
        }
        #tab-DASHBOARD:hover:not(.active) { 
            border-bottom-color: rgba(124, 58, 237, 0.2); 
            color: #6d28d9;
        }
        
        #tab-DONE.active { 
            color: #10b981; 
            border-bottom-color: #10b981; 
        }
        #tab-DONE:hover:not(.active) { 
            border-bottom-color: rgba(52, 199, 89, 0.2);
            color: #2c9f4b;
        }
        
        /* Nút bấm (Buttons) - Compact */
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border-radius: 8px; font-weight: 600; padding: 6px 14px; transition: all 0.2s; box-shadow: 0 2px 6px rgba(59, 130, 246, 0.3); font-size: 12px; }
        .btn-primary:hover { background: #006ce6; transform: scale(0.98); }
        
        /* Action Menu - Compact Dropdown Style */
        .action-menu-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .action-menu-trigger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(99, 102, 241, 0.08) 100%);
            border: 1px solid rgba(59, 130, 246, 0.2);
            cursor: pointer;
            font-size: 18px;
            color: #3b82f6;
            transition: all 0.2s;
        }
        
        .action-menu-trigger:hover {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(99, 102, 241, 0.12) 100%);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.2);
        }
        
        .action-menu-trigger.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(99, 102, 241, 0.15) 100%);
            border-color: #3b82f6;
        }
        
        .action-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.1);
            z-index: 1000;
            min-width: 180px;
            overflow: hidden;
            display: none;
        }
        
        .action-menu.show {
            display: block;
            animation: slideDown 0.2s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .action-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: none;
            background: transparent;
            color: #1e293b;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .action-menu-item:last-child {
            border-bottom: none;
        }
        
        .action-menu-item:hover {
            background: #f8fafc;
        }
        
        .action-menu-item.edit { color: #2563eb; }
        .action-menu-item.delete { color: #f43f5e; }
        .action-menu-item.add { color: #10b981; }
        .action-menu-item.archive { color: #7c3aed; }
        .action-menu-item.archived { color: #10b981; font-weight: 700; }
        
        .action-menu-icon {
            font-size: 14px;
            width: 16px;
            text-align: center;
        }
        
        /* Nút Hành động nhỏ trong bảng - Compact */
        .action-btn { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; transition: background 0.2s; cursor: pointer; white-space: nowrap; }
        .btn-edit { color: #2563eb; background: rgba(59, 130, 246, 0.1); } .btn-edit:hover { background: rgba(59, 130, 246, 0.2); }
        .btn-delete { color: #f43f5e; background: rgba(244, 63, 94, 0.1); } .btn-delete:hover { background: rgba(244, 63, 94, 0.15); }
        .btn-addsub { color: #10b981; background: rgba(16, 185, 129, 0.1); } .btn-addsub:hover { background: rgba(16, 185, 129, 0.2); }
        .btn-archive { color: #6366f1; background: rgba(99, 102, 241, 0.1); } .btn-archive:hover { background: rgba(99, 102, 241, 0.2); }
        
        /* Khoảng trắng giữa các Main Task */
        .spacer-row td { height: 32px; background-color: #ffffff; border: none !important; }
        
        /* Row hover effect */
        tbody tr { transition: background-color 0.2s ease; }
        tbody tr:hover { background-color: rgba(0, 122, 255, 0.04) !important; }
        
        /* Responsive Design */
        @media (max-width: 1024px) {
            body { font-size: 11px; }
            th, td { padding: 8px 8px; }
            th { font-size: 9px; letter-spacing: 0.04em; }
            .task-name-col { min-width: 150px; max-width: 200px; font-size: 11px; }
            .gantt-cell { padding: 6px 4px !important; min-width: 28px; height: 36px; }
            .w-36 { width: 120px !important; }
            .w-24 { width: 80px !important; }
            .w-40 { width: 120px !important; }
            .zoom-controls { gap: 8px; padding: 8px 12px; font-size: 10px; }
            .zoom-btn { padding: 5px 10px; font-size: 10px; min-width: 34px; }
            .zoom-btn-fit { min-width: 38px; font-size: 10px; }
            .zoom-display { font-size: 10px; min-width: 45px; }
            .tab-btn { padding: 9px 16px; font-size: 11px; }
        }
        
        @media (max-width: 768px) {
            body { font-size: 10px; }
            th, td { padding: 6px 6px; }
            th { font-size: 8px; letter-spacing: 0.02em; }
            .task-name-col { min-width: 120px; max-width: 160px; font-size: 10px; }
            .gantt-cell { padding: 5px 3px !important; min-width: 24px; height: 32px; }
            .action-btn { padding: 2px 6px; font-size: 9px; }
            .w-36 { width: 100px !important; }
            .w-24 { width: 60px !important; }
            .w-40 { width: 100px !important; }
            .zoom-controls { gap: 6px; padding: 8px 10px; font-size: 9px; white-space: normal; }
            .zoom-btn { padding: 4px 8px; font-size: 9px; min-width: 30px; }
            .zoom-btn-fit { min-width: 34px; font-size: 9px; }
            .zoom-display { font-size: 10px; min-width: 40px; }
            .tab-btn { padding: 8px 14px; font-size: 10px; letter-spacing: 0.03em; }
        }
        
        @media (max-width: 480px) {
            body { font-size: 9px; }
            th, td { padding: 4px 4px; }
            th { font-size: 7px; letter-spacing: 0.01em; }
            .task-name-col { min-width: 100px; max-width: 140px; font-size: 9px; }
            .gantt-cell { padding: 4px 2px !important; min-width: 20px; height: 28px; }
            input, select { padding: 5px 8px; font-size: 10px; }
            .tabs-container { padding: 2px; margin-bottom: 12px; flex: 1 1 100%; }
            .tab-btn { padding: 6px 10px; font-size: 8px; letter-spacing: 0.02em; }
            .btn-primary { padding: 5px 10px; font-size: 10px; }
            .w-36 { width: 80px !important; }
            .w-24 { width: 50px !important; }
            .w-40 { width: 80px !important; }
            .w-full { width: 100% !important; }
            .zoom-controls { gap: 4px; padding: 6px 8px; font-size: 8px; flex: 1 1 100%; order: 3; }
            .zoom-btn { padding: 4px 6px; font-size: 8px; min-width: 26px; }
            .zoom-btn-fit { min-width: 30px; padding: 4px 5px; font-size: 7px; }
            .zoom-display { font-size: 9px; min-width: 35px; }
        }
        
        /* Form Container Compact */
        .max-w-\[98\%\] { max-width: 98% !important; padding: 16px !important; }
        
        /* Legend Compact */
        .flex.gap-4.text-xs { gap: 12px !important; font-size: 11px !important; }
        
        @media (max-width: 768px) {
            .max-w-\[98\%\] { padding: 12px !important; }
            .flex.gap-4.text-xs { gap: 8px !important; font-size: 9px !important; }
            .flex.flex-wrap.gap-4 { gap: 8px !important; }
        }
        
        @media (max-width: 480px) {
            .max-w-\[98\%\] { padding: 8px !important; }
            .flex.gap-4.text-xs { gap: 6px !important; font-size: 8px !important; flex-wrap: wrap; }
            .flex.flex-wrap.gap-4 { gap: 6px !important; padding: 8px !important; }
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-[98%] mx-auto bg-white p-8 rounded-2xl shadow-[0_2px_8px_rgba(15,23,42,0.05)] border border-[#e2e8f0]">
        <!-- HEADER WITH TITLE, TABS AND ZOOM CONTROLS -->
        <div class="flex justify-between items-center gap-6 mb-6 flex-wrap">
            <h1 class="text-2xl font-bold text-[#1e293b] tracking-tight">Master Work Plan</h1>
            
            <!-- TABS NAV (Segmented Control) -->
            <div class="tabs-container">
                <div id="tab-SVL" class="tab-btn active" onclick="switchTab('SVL')">SVL</div>
                <div id="tab-SGV" class="tab-btn" onclick="switchTab('SGV')">SGV</div>
                <div id="tab-SVN" class="tab-btn" onclick="switchTab('SVN')">SVN</div>
                <div id="tab-DASHBOARD" class="tab-btn text-[#7c3aed]" onclick="switchTab('DASHBOARD')">Báo cáo & Gantt</div>
                <div id="tab-DONE" class="tab-btn text-[#10b981]" onclick="switchTab('DONE')">Đã lưu trữ</div>
            </div>
            
            <!-- ZOOM CONTROLS -->
            <div class="zoom-controls">
                <span style="color: #64748b; font-size: 11px; font-weight: 600;">Zoom:</span>
                <button class="zoom-btn" onclick="zoomOut()">−</button>
                <span class="zoom-display" id="zoomLevel">100%</span>
                <button class="zoom-btn" onclick="zoomIn()">+</button>
                <button class="zoom-btn zoom-btn-fit" onclick="zoomFit()" title="Fit to screen">Fit</button>
                <button class="zoom-btn" onclick="zoomReset()" style="background: linear-gradient(135deg, #86868b 0%, #6b6b70 100%); box-shadow: 0 2px 6px rgba(0,0,0,0.15);">Reset</button>
            </div>
        </div>
        
        <!-- FORM TẠO NHANH -->
        <div class="flex flex-wrap gap-4 items-end bg-[#f9fafb] p-5 rounded-[16px] mb-8 border border-[#e2e8f0]">
            <div>
                <label class="block text-[11px] font-bold text-[#64748b] uppercase tracking-wider mb-1">Công ty</label>
                <select id="q_company" class="w-24 font-semibold text-[#1e293b]">
                    <option value="SVL">SVL</option>
                    <option value="SGV">SGV</option>
                    <option value="SVN">SVN</option>
                </select>
            </div>
            <div class="flex-1 min-w-[250px]">
                <label class="block text-[11px] font-bold text-[#64748b] uppercase tracking-wider mb-1">Tên Công Việc Chính</label>
                <input type="text" id="q_name" placeholder="Nhập tên công việc..." class="w-full">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-[#64748b] uppercase tracking-wider mb-1">Từ ngày</label>
                <input type="date" id="q_start" class="w-36">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-[#64748b] uppercase tracking-wider mb-1">Đến ngày</label>
                <input type="date" id="q_due" class="w-36">
            </div>
            <button onclick="quickAddMainTask()" class="btn-primary flex items-center gap-1 mb-[2px]">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Tạo mới
            </button>
        </div>

        <!-- BỘ LỌC DASHBOARD (Ẩn/Hiện tự động) -->
        <div id="dashboardFilters" class="hidden flex gap-4 flex-wrap items-end bg-[#f9fafb] p-5 rounded-[16px] mb-6 border border-[#e2e8f0]">
            <div><label class="block text-[11px] font-bold text-[#64748b] uppercase tracking-wider mb-1">Từ ngày</label><input type="date" id="filterStart"></div>
            <div><label class="block text-[11px] font-bold text-[#64748b] uppercase tracking-wider mb-1">Đến ngày</label><input type="date" id="filterEnd"></div>
            <div><label class="block text-[11px] font-bold text-[#64748b] uppercase tracking-wider mb-1">Trạng thái</label>
                <select id="filterStatus" class="w-40 font-semibold">
                    <option value="ALL">Tất cả</option>
                    <option value="Complete">Hoàn thành</option>
                    <option value="Incomplete">Chưa hoàn thành</option>
                </select>
            </div>
            <button onclick="renderView()" class="btn-primary bg-[#7c3aed] shadow-none hover:bg-[#6d28d9] mb-[2px]">Lọc dữ liệu</button>
        </div>

        <!-- CHÚ GIẢI GANTT -->
        <div class="flex gap-4 text-xs font-semibold items-center mb-3 justify-end text-[#64748b]">
            <span class="flex items-center gap-1.5"><span class="inline-block w-3 h-3 bg-[#10b981] rounded-full"></span> Complete</span>
            <span class="flex items-center gap-1.5"><span class="inline-block w-3 h-3 bg-[#ff9f0a] rounded-full"></span> In Progress</span>
            <span class="flex items-center gap-1.5"><span class="inline-block w-3 h-3 bg-[#f43f5e] rounded-full"></span> Pending</span>
            <span class="flex items-center gap-1.5 border-l border-[#cbd5e1] pl-3"><span class="inline-block w-3 h-3 bg-[rgba(255,59,48,0.2)] border border-[#f43f5e] rounded-full"></span> Today Marker</span>
        </div>

        <!-- UNIFIED TABLE CHO TẤT CẢ CÁC TAB -->
        <div id="tableWrapper">
            <div class="table-container">
                <table id="mainTable">
                    <thead id="mainHead"></thead>
                    <tbody id="mainBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL THÊM/SỬA TASK -->
    <div id="taskModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex justify-center items-center z-50 transition-opacity">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-[500px] border border-[#e2e8f0]">
            <h3 id="modalTitle" class="text-xl font-bold text-[#1e293b] mb-6">Thông tin Công Việc</h3>
            <div class="space-y-5">
                <div>
                    <label class="block text-[12px] font-bold text-[#64748b] uppercase tracking-wider mb-2">Tên công việc <span class="text-[#f43f5e]">*</span></label>
                    <input type="text" id="m_name" class="w-full">
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-[12px] font-bold text-[#64748b] uppercase tracking-wider mb-2">Bắt đầu <span class="text-[#f43f5e]">*</span></label>
                        <input type="date" id="m_start" class="w-full">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-[12px] font-bold text-[#64748b] uppercase tracking-wider mb-2">Kết thúc <span class="text-[#f43f5e]">*</span></label>
                        <input type="date" id="m_due" class="w-full">
                    </div>
                </div>
                <div id="statusControlBox" class="flex gap-4">
                    <div class="w-full">
                        <label class="block text-[12px] font-bold text-[#64748b] uppercase tracking-wider mb-2">Trạng thái Sub-task</label>
                        <select id="m_status" class="w-full font-semibold bg-[#f8fafc]">
                            <option value="Not Start">Not Start (0%)</option>
                            <option value="Pending">Pending (25%)</option>
                            <option value="In Progress">In Progress (50%)</option>
                            <option value="Complete">Complete (100%)</option>
                        </select>
                    </div>
                </div>
                <div id="mainTaskWarning" class="hidden text-[12px] font-medium text-[#64748b] bg-[#f9fafb] p-3 rounded-xl border border-[#e2e8f0] flex items-start gap-2">
                    <svg class="w-4 h-4 mt-0.5 flex-shrink-0 text-[#007aff]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span>Trạng thái và tiến độ của Công việc Chính (Main Task) được tính toán tự động dựa trên tổng các Sub-task con.</span>
                </div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-5 py-2.5 bg-[#f9fafb] text-[#1e293b] rounded-xl font-bold hover:bg-[#e2e8f0] transition-colors">Hủy Bỏ</button>
                <button onclick="saveTaskModal()" class="px-6 py-2.5 bg-[#007aff] text-white rounded-xl font-bold hover:bg-[#2563eb] transition-colors shadow-md">Lưu Lại</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // CẤU HÌNH FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyA8XGvUoCBWs8WUlwC2hUEHPF6RQl6eSM0",
            authDomain: "dailyworkplan-de669.firebaseapp.com",
            databaseURL: "https://dailyworkplan-de669-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dailyworkplan-de669",
            storageBucket: "dailyworkplan-de669.firebasestorage.app",
            messagingSenderId: "703304226095",
            appId: "1:703304226095:web:4b75c9cb7d2f9f32f57dda"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tasksRef = ref(db, 'tasks');

        const STATUS_MAP = { "Not Start": 0, "Pending": 25, "In Progress": 50, "Complete": 100 };

        window.allTasks = [];
        window.currentTab = 'SVL';
        window.modalState = { mode: '', parentId: null, dbKey: null, isMain: false };

        // ZOOM CONTROL FUNCTIONS
        let currentZoom = 100;
        const minZoom = 50;
        const maxZoom = 200;
        const zoomStep = 10;

        window.zoomIn = function() {
            if (currentZoom < maxZoom) {
                currentZoom += zoomStep;
                applyZoom();
            }
        };

        window.zoomOut = function() {
            if (currentZoom > minZoom) {
                currentZoom -= zoomStep;
                applyZoom();
            }
        };

        window.zoomReset = function() {
            currentZoom = 100;
            applyZoom();
        };

        window.applyZoom = function() {
            const wrapper = document.getElementById('tableWrapper');
            const scale = currentZoom / 100;
            wrapper.style.transform = `scale(${scale})`;
            document.getElementById('zoomLevel').textContent = currentZoom + '%';
            
            // Adjust wrapper height and width for proper scrolling
            wrapper.style.width = (100 / scale) + '%';
            wrapper.style.height = 'auto';
        };

        window.zoomFit = function() {
            try {
                const tableContainer = document.querySelector('.table-container');
                const tableElement = document.getElementById('mainTable');
                const mainContainer = document.querySelector('.max-w-\\[98\\%\\]');
                
                if (!tableElement || !mainContainer) return;
                
                // Get dimensions
                const tableWidth = tableElement.scrollWidth;
                const containerWidth = mainContainer.offsetWidth - 32; // Subtract padding
                
                // Calculate the zoom level needed to fit the table
                const fitZoom = Math.floor((containerWidth / tableWidth) * 100);
                
                // Constrain to min/max range
                currentZoom = Math.max(minZoom, Math.min(maxZoom, fitZoom));
                
                applyZoom();
            } catch (e) {
                console.log('Fit zoom calculation error, using 100%');
                currentZoom = 100;
                applyZoom();
            }
        };

        onValue(tasksRef, (snapshot) => {
            window.allTasks = [];
            snapshot.forEach((child) => { window.allTasks.push({ dbKey: child.key, ...child.val() }); });
            
            window.allTasks.sort((a, b) => {
                let aParts = a.taskId.split('.').map(Number);
                let bParts = b.taskId.split('.').map(Number);
                for(let i=0; i < Math.max(aParts.length, bParts.length); i++) {
                    let av = aParts[i] || 0; let bv = bParts[i] || 0;
                    if(av !== bv) return av - bv;
                }
                return 0;
            });
            renderView();
        });

        window.switchTab = function(tabName) {
            window.currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            
            if(tabName === 'DASHBOARD') {
                document.getElementById('dashboardFilters').classList.remove('hidden');
            } else {
                document.getElementById('dashboardFilters').classList.add('hidden');
            }
            renderView();
        };

        function getProcessedTasks() {
            let showDone = (window.currentTab === 'DONE');
            let processed = JSON.parse(JSON.stringify(window.allTasks)); 
            processed = processed.filter(t => (t.archived === true) === showDone);
            
            if(window.currentTab !== 'DONE' && window.currentTab !== 'DASHBOARD') {
                processed = processed.filter(t => t.company === window.currentTab);
            }

            if(window.currentTab === 'DASHBOARD') {
                let fStatus = document.getElementById('filterStatus').value;
                if(fStatus === 'Complete') processed = processed.filter(t => t.progressSub == 100 || (t.status === 'Complete'));
                if(fStatus === 'Incomplete') processed = processed.filter(t => t.progressSub < 100 && t.status !== 'Complete');
            }

            processed.forEach(task => {
                if(task.taskId && task.taskId.includes('.')) {
                    task.progressSub = STATUS_MAP[task.status] !== undefined ? STATUS_MAP[task.status] : 0;
                }
            });

            processed.forEach(task => {
                if(!task.taskId.includes('.')) {
                    let subs = processed.filter(t => t.taskId.startsWith(task.taskId + '.'));
                    if(subs.length > 0) {
                        let sum = 0;
                        subs.forEach(s => sum += s.progressSub);
                        let avg = Math.round(sum / subs.length);
                        task.progressSub = avg;
                        
                        if(avg === 0) task.status = 'Not Start';
                        else if(avg === 100) task.status = 'Complete';
                        else task.status = 'In Progress';
                    } else {
                        task.progressSub = 0;
                        task.status = 'Not Start';
                    }
                }
            });
            return processed;
        }

        function getStatusPill(status) {
            if(status === 'Complete') return '<span class="bg-[#d1fae5] text-[#047857] px-3 py-1 rounded-full text-[11px] font-bold">Complete</span>';
            if(status === 'In Progress') return '<span class="bg-[#fef3c7] text-[#b45309] px-3 py-1 rounded-full text-[11px] font-bold">In Progress</span>';
            if(status === 'Pending') return '<span class="bg-[#ffe4e6] text-[#be123c] px-3 py-1 rounded-full text-[11px] font-bold">Pending</span>';
            return '<span class="bg-[#f1f5f9] text-[#475569] px-3 py-1 rounded-full text-[11px] font-bold">Not Start</span>';
        }
        function getGanttClass(status) {
            if(status === 'Complete') return 'gantt-complete';
            if(status === 'In Progress') return 'gantt-inprogress';
            if(status === 'Pending') return 'gantt-pending';
            return 'gantt-notstart';
        }

        window.renderView = function() {
            let isDashboard = (window.currentTab === 'DASHBOARD');
            let isDoneTab = (window.currentTab === 'DONE');
            let tasks = getProcessedTasks();
            
            const thead = document.getElementById('mainHead');
            const tbody = document.getElementById('mainBody');
            thead.innerHTML = ''; tbody.innerHTML = '';
            
            if(tasks.length === 0) { 
                tbody.innerHTML = `<tr><td colspan="100%" class="text-center py-12 text-[#64748b] text-sm">Danh sách trống. Tạo công việc mới để bắt đầu.</td></tr>`; 
                return; 
            }

            let today = new Date();
            today.setHours(0,0,0,0);

            let minDate = new Date("2099-12-31");
            let maxDate = new Date("1900-01-01");
            let fStart = isDashboard ? document.getElementById('filterStart').value : null;
            let fEnd = isDashboard ? document.getElementById('filterEnd').value : null;

            if(fStart) minDate = new Date(fStart);
            if(fEnd) maxDate = new Date(fEnd);

            if(!fStart || !fEnd) {
                tasks.forEach(t => {
                    let s = t.startDate ? new Date(t.startDate) : null;
                    let d = t.dueDate ? new Date(t.dueDate) : null;
                    if(!fStart && s && s < minDate) minDate = s;
                    if(!fEnd && d && d > maxDate) maxDate = d;
                });
            }
            if(minDate > maxDate) { minDate = new Date(); maxDate = new Date(); }
            
            if(today < minDate && !fStart) minDate = new Date(today);
            if(today > maxDate && !fEnd) maxDate = new Date(today);

            let dateRange = [];
            let curr = new Date(minDate);
            while(curr <= maxDate) { dateRange.push(new Date(curr)); curr.setDate(curr.getDate() + 1); }

            let showCompCol = (isDashboard || isDoneTab);
            let trDay = `<tr>`;
            if(showCompCol) trDay += `<th rowspan="2" class="sticky-col">Cty</th>`;
            
            trDay += `<th rowspan="2" class="w-16">#</th>
                      <th rowspan="2" class="task-name-col">Task Name</th>
                      <th rowspan="2" class="w-24">Bắt Đầu</th>
                      <th rowspan="2" class="w-24">Kết Thúc</th>
                      <th rowspan="2" class="w-12">Ngày</th>
                      <th rowspan="2" class="w-28">Status</th>
                      <th rowspan="2" class="w-16">%</th>
                      <th rowspan="2" class="w-48">Hành động</th>`;
                      
            let trDate = `<tr>`;
            dateRange.forEach(d => {
                let isW = (d.getDay()===0 || d.getDay()===6) ? "bg-weekend-head" : "";
                let isT = (d.getTime() === today.getTime()) ? "today-head" : "";
                trDay += `<th class="gantt-cell ${isW} ${isT}">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()]}</th>`;
                trDate += `<th class="gantt-cell ${isW} ${isT}">${d.getDate() + "/" + (d.getMonth()+1)}</th>`;
            });
            thead.innerHTML = trDay + "</tr>" + trDate + "</tr>";

            let lastMainId = null;
            
            tasks.forEach(task => {
                let currentMainId = task.taskId.split('.')[0];
                let isMain = !task.taskId.includes('.');
                
                // CHÈN KHOẢNG TRẮNG GIỮA CÁC MAIN TASK (Yêu cầu làm rõ phân cách)
                if(isMain && lastMainId !== null && currentMainId !== lastMainId) {
                    tbody.innerHTML += `<tr class="spacer-row"><td colspan="100%"></td></tr>`;
                }
                if(isMain) lastMainId = currentMainId;

                let sDate = task.startDate ? new Date(task.startDate) : null;
                if(sDate) sDate.setHours(0,0,0,0);
                let dDate = task.dueDate ? new Date(task.dueDate) : null;
                if(dDate) dDate.setHours(0,0,0,0);
                
                let daysCount = (sDate && dDate) ? Math.round((dDate - sDate) / 86400000) + 1 : '';
                let sShow = sDate ? ("0"+sDate.getDate()).slice(-2)+"/"+("0"+(sDate.getMonth()+1)).slice(-2)+"/"+sDate.getFullYear() : '';
                let dShow = dDate ? ("0"+dDate.getDate()).slice(-2)+"/"+("0"+(dDate.getMonth()+1)).slice(-2)+"/"+dDate.getFullYear() : '';

                let stPill = getStatusPill(task.status);
                let stGanttClass = getGanttClass(task.status);
                
                // THIẾT KẾ BADGE KHOANH TRÒN CHO MAIN TASK
                let badge = isMain 
                    ? `<div class="w-7 h-7 mx-auto rounded-full bg-[#007aff] text-white flex items-center justify-center text-[11px] font-bold shadow-md">${task.taskId}</div>` 
                    : `<span class="text-[#64748b] text-[12px] font-bold">${task.taskId}</span>`;

                let indent = isMain ? 'font-bold text-[13px] text-[#1e293b]' : 'pl-8 text-[#475569]';
                
                // Khung Hành Động - Dropdown Menu
                let actionMenuId = `menu-${task.dbKey}`;
                let actionBtns = `
                    <div class="action-menu-wrapper">
                        <button class="action-menu-trigger" onclick="toggleActionMenu('${actionMenuId}')" title="Tùy chọn">⋮</button>
                        <div class="action-menu" id="${actionMenuId}">`;
                
                // Always show Edit & Delete
                actionBtns += `<button class="action-menu-item edit" onclick="editTask('${task.dbKey}')" title="Chỉnh sửa">
                                <span class="action-menu-icon">✏️</span>
                                <span>Sửa</span>
                              </button>`;
                actionBtns += `<button class="action-menu-item delete" onclick="deleteTask('${task.dbKey}', '${task.taskId}')" title="Xóa">
                                <span class="action-menu-icon">🗑️</span>
                                <span>Xóa</span>
                              </button>`;
                
                // Show Add Sub & Archive only for Main Tasks
                if(isMain && !isDoneTab) {
                    actionBtns += `<button class="action-menu-item add" onclick="openModal('${task.taskId}')" title="Thêm Sub-task">
                                    <span class="action-menu-icon">➕</span>
                                    <span>Thêm Sub</span>
                                  </button>`;
                    actionBtns += `<button class="action-menu-item archive" onclick="archiveTask('${task.taskId}', '${task.company}')" title="Lưu trữ">
                                    <span class="action-menu-icon">📥</span>
                                    <span>Lưu trữ</span>
                                  </button>`;
                }
                if(isMain && isDoneTab) { 
                    actionBtns += `<div class="action-menu-item archived">
                                    <span class="action-menu-icon">✅</span>
                                    <span>Đã Lưu</span>
                                  </div>`; 
                }
                
                actionBtns += `</div></div>`;

                let rowHtml = `<tr class="hover:bg-[#f9f9f9] transition-colors">`;
                if(showCompCol) rowHtml += `<td class="sticky-col bg-white text-center font-bold text-[#64748b]">${task.company}</td>`;
                
                rowHtml += `
                    <td class="text-center">${badge}</td>
                    <td class="task-name-col ${indent}">${isMain ? '' : '<span class="text-[#cbd5e1] mr-1">↳</span>'}${task.name}</td>
                    <td class="text-center text-[#475569] font-medium">${sShow}</td>
                    <td class="text-center text-[#475569] font-medium">${dShow}</td>
                    <td class="text-center font-bold text-[#64748b]">${daysCount}</td>
                    <td class="text-center">${stPill}</td>
                    <td class="text-center font-bold text-[#1e293b]">${task.progressSub}%</td>
                    <td class="text-center whitespace-nowrap">${actionBtns}</td>`;

                // VẼ Ô GANTT
                dateRange.forEach(d => {
                    let dTime = d.getTime();
                    let isTaskDay = (sDate && dDate && dTime >= sDate.getTime() && dTime <= dDate.getTime());
                    let isT = (dTime === today.getTime()) ? "today-col" : "";
                    
                    let cellClass = isTaskDay ? stGanttClass : ((d.getDay()===0 || d.getDay()===6) ? "bg-weekend-body" : "");
                    rowHtml += `<td class="gantt-cell ${cellClass} ${isT}"></td>`;
                });
                
                tbody.innerHTML += rowHtml + `</tr>`;
            });
        }

        window.quickAddMainTask = function() {
            let comp = document.getElementById('q_company').value;
            let name = document.getElementById('q_name').value.trim();
            let start = document.getElementById('q_start').value;
            let due = document.getElementById('q_due').value;

            if(!name || !start || !due) { alert("Vui lòng nhập Tên, Ngày bắt đầu và kết thúc!"); return; }

            let newId = getNextTaskId(comp, null);
            push(tasksRef, { company: comp, taskId: newId, name: name, startDate: start, dueDate: due, status: "Not Start", archived: false });

            document.getElementById('q_name').value = ''; document.getElementById('q_start').value = ''; document.getElementById('q_due').value = '';
            switchTab(comp); 
        }

        window.archiveTask = function(taskId, comp) {
            if(confirm("Lưu công việc này? (Nó và các Sub-task sẽ được chuyển qua tab LƯU TRỮ)")) {
                let toArchive = window.allTasks.filter(t => t.company === comp && (t.taskId === taskId || t.taskId.startsWith(taskId + '.')));
                toArchive.forEach(t => { update(ref(db, 'tasks/' + t.dbKey), { archived: true }); });
            }
            window.closeAllMenus();
        }

        function getNextTaskId(company, parentId = null) {
            let compTasks = window.allTasks.filter(t => t.company === company);
            if(!parentId) { 
                let mains = compTasks.filter(t => !t.taskId.includes('.'));
                if(mains.length === 0) return "1";
                let max = Math.max(...mains.map(t => parseInt(t.taskId)));
                return (max + 1).toString();
            } else { 
                let subs = compTasks.filter(t => t.taskId.startsWith(parentId + '.'));
                if(subs.length === 0) return parentId + ".1";
                let max = Math.max(...subs.map(t => parseInt(t.taskId.split('.')[1])));
                return parentId + "." + (max + 1).toString();
            }
        }

        window.openModal = function(parentId = null) {
            window.modalState = { mode: 'ADD', parentId: parentId, dbKey: null, isMain: !parentId };
            document.getElementById('modalTitle').innerText = `Thêm Sub-task (Tạo cho ID: ${parentId})`;
            document.getElementById('m_name').value = ''; document.getElementById('m_start').value = ''; document.getElementById('m_due').value = ''; document.getElementById('m_status').value = 'Not Start';
            
            document.getElementById('statusControlBox').classList.remove('hidden');
            document.getElementById('mainTaskWarning').classList.add('hidden');
            document.getElementById('taskModal').classList.remove('hidden');
            window.closeAllMenus();
        };

        window.editTask = function(dbKey) {
            let task = window.allTasks.find(t => t.dbKey === dbKey);
            if(!task) return;
            let isMain = !task.taskId.includes('.');
            window.modalState = { mode: 'EDIT', parentId: null, dbKey: dbKey, isMain: isMain };
            
            document.getElementById('modalTitle').innerText = `Chỉnh sửa Task ${task.taskId}`;
            document.getElementById('m_name').value = task.name; document.getElementById('m_start').value = task.startDate; document.getElementById('m_due').value = task.dueDate; document.getElementById('m_status').value = task.status;
            
            if(isMain) {
                document.getElementById('statusControlBox').classList.add('hidden');
                document.getElementById('mainTaskWarning').classList.remove('hidden');
                document.getElementById('mainTaskWarning').classList.add('flex');
            } else {
                document.getElementById('statusControlBox').classList.remove('hidden');
                document.getElementById('mainTaskWarning').classList.add('hidden');
                document.getElementById('mainTaskWarning').classList.remove('flex');
            }
            document.getElementById('taskModal').classList.remove('hidden');
            window.closeAllMenus();
        };

        window.closeModal = function() { document.getElementById('taskModal').classList.add('hidden'); };

        window.saveTaskModal = function() {
            let nName = document.getElementById('m_name').value; let nStart = document.getElementById('m_start').value; let nDue = document.getElementById('m_due').value; let nStatus = document.getElementById('m_status').value;
            if(!nName || !nStart || !nDue) return alert('Vui lòng nhập đủ Tên và Ngày tháng!');

            let payload = { name: nName, startDate: nStart, dueDate: nDue };
            if(!window.modalState.isMain) payload.status = nStatus;

            if(window.modalState.mode === 'ADD') {
                payload.company = window.currentTab; payload.taskId = getNextTaskId(window.currentTab, window.modalState.parentId); payload.archived = false;
                push(tasksRef, payload);
            } else if (window.modalState.mode === 'EDIT') { update(ref(db, 'tasks/' + window.modalState.dbKey), payload); }
            closeModal();
        };

        // ACTION MENU FUNCTIONS
        window.closeAllMenus = function() {
            document.querySelectorAll('.action-menu').forEach(menu => {
                menu.classList.remove('show');
                if (menu.previousElementSibling) {
                    menu.previousElementSibling.classList.remove('active');
                }
            });
        };
        
        window.toggleActionMenu = function(menuId) {
            const menu = document.getElementById(menuId);
            const trigger = menu.previousElementSibling;
            
            // Close all other menus
            document.querySelectorAll('.action-menu').forEach(m => {
                if (m.id !== menuId) {
                    m.classList.remove('show');
                    m.previousElementSibling.classList.remove('active');
                }
            });
            
            // Toggle current menu
            menu.classList.toggle('show');
            trigger.classList.toggle('active');
        };
        
        // ========================================
        // PWA SERVICE WORKER REGISTRATION
        // ========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registered:', registration);
                        
                        // Check for updates periodically
                        setInterval(() => {
                            registration.update();
                        }, 60000); // Check every minute
                        
                        // Listen for updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // New version available
                                    console.log('New version available!');
                                    // Optionally show update notification
                                }
                            });
                        });
                    })
                    .catch(error => console.log('Service Worker registration failed:', error));
            });
            
            // Handle updates from service worker
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log('Service Worker controller changed - app updated!');
            });
        }
        
        // ========================================
        // PWA INSTALL PROMPT
        // ========================================
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the mini-infobar from appearing
            e.preventDefault();
            // Stash the event for later use
            deferredPrompt = e;
            console.log('Install prompt ready');
        });
        
        // Optional: Add install button functionality
        window.installApp = function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('App installed!');
                    }
                    deferredPrompt = null;
                });
            }
        };
        
        // Detect if running as standalone app
        if (window.navigator.standalone === true) {
            console.log('Running as standalone PWA');
            document.documentElement.classList.add('standalone');
        }
        
        // Handle app visibility changes (when switching apps)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                console.log('App backgrounded');
            } else {
                console.log('App foregrounded - syncing data');
                // Trigger any pending syncs
            }
        });
    </script>
</body>
</html>
