<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Work Plan - Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 13px; }
        table { border-collapse: collapse; width: 100%; white-space: nowrap; }
        th, td { border: 1px solid #cbd5e1; padding: 8px 10px; text-align: left; }
        th { background-color: #1e293b; color: white; text-align: center; font-weight: bold; border: 1px solid #334155; }
        .text-center { text-align: center; }
        
        /* Thu gọn cột Task Name và cho phép ngắt dòng */
        .task-name-col { min-width: 250px; max-width: 350px; white-space: normal; word-wrap: break-word; line-height: 1.4; }
        
        /* Màu trạng thái text cho bảng công việc */
        .text-status-complete { color: #047857; font-weight: 600; background-color: #d1fae5; }
        .text-status-inprogress { color: #b45309; font-weight: 600; background-color: #fef3c7; }
        .text-status-pending { color: #be123c; font-weight: 600; background-color: #ffe4e6; }
        .text-status-notstart { color: #475569; font-weight: 600; background-color: #f1f5f9; }
        
        /* MÀU BIỂU ĐỒ GANTT (Phẳng & Hiện đại) */
        .gantt-complete { background-color: #10b981 !important; } /* Xanh ngọc */
        .gantt-inprogress { background-color: #f59e0b !important; } /* Vàng hổ phách */
        .gantt-pending { background-color: #f43f5e !important; } /* Đỏ hồng */
        .gantt-notstart { background-color: #cbd5e1 !important; } /* Xám nhạt */
        
        /* Line đánh dấu ngày Hiện tại (Today Marker) */
        .today-col { border-left: 2px dashed #ef4444 !important; border-right: 2px dashed #ef4444 !important; background-color: rgba(239, 68, 68, 0.05); }
        .today-head { border-left: 2px dashed #ef4444 !important; border-right: 2px dashed #ef4444 !important; background-color: #fee2e2 !important; color: #b91c1c !important; }
        
        .bg-weekend-head { background-color: #334155 !important; color: #cbd5e1; } 
        .bg-weekend-body { background-color: #f8fafc; } 
        
        .table-container { overflow-x: auto; max-width: 100%; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .sticky-col { position: sticky; left: 0; background-color: white; z-index: 10; border-right: 2px solid #94a3b8;}
        th.sticky-col { background-color: #1e293b; z-index: 11; }
        
        input, select { border: 1px solid #ccc; padding: 7px; border-radius: 4px; font-size: 13px; outline: none; }
        input:focus, select:focus { border-color: #1e293b; }
        
        .tab-btn { padding: 10px 24px; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; color: #64748b; transition: all 0.3s; }
        .tab-btn.active { border-bottom: 3px solid #1e293b; color: #1e293b; background-color: #f1f5f9; }
        .tab-btn:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-gray-100 p-4 min-h-screen">

    <div class="max-w-[98%] mx-auto bg-white p-5 rounded shadow-lg border-t-4 border-slate-800">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 uppercase tracking-wider">MASTER WORK PLAN - REALTIME DATABASE</h1>
        
        <!-- FORM TẠO NHANH -->
        <div class="flex flex-wrap gap-4 items-end bg-slate-50 p-4 rounded border border-slate-200 mb-6 shadow-sm">
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">Công ty</label>
                <select id="q_company" class="w-24 font-bold text-slate-800">
                    <option value="SVL">SVL</option>
                    <option value="SGV">SGV</option>
                    <option value="SVN">SVN</option>
                </select>
            </div>
            <div class="flex-1 min-w-[250px]">
                <label class="block text-xs font-bold text-slate-700 mb-1">Tên Công Việc Chính</label>
                <input type="text" id="q_name" placeholder="Nhập tên công việc..." class="w-full">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">Từ ngày</label>
                <input type="date" id="q_start" class="w-36">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">Đến ngày</label>
                <input type="date" id="q_due" class="w-36">
            </div>
            <button onclick="quickAddMainTask()" class="bg-slate-700 text-white font-bold px-6 py-[9px] rounded shadow hover:bg-slate-800 transition-colors">
                + TẠO CÔNG VIỆC
            </button>
        </div>

        <!-- TABS NAV -->
        <div class="flex space-x-1 border-b border-slate-300 mb-5">
            <div id="tab-SVL" class="tab-btn active" onclick="switchTab('SVL')">SVL</div>
            <div id="tab-SGV" class="tab-btn" onclick="switchTab('SGV')">SGV</div>
            <div id="tab-SVN" class="tab-btn" onclick="switchTab('SVN')">SVN</div>
            <div id="tab-DASHBOARD" class="tab-btn text-purple-700" onclick="switchTab('DASHBOARD')">BÁO CÁO & GANTT</div>
            <div id="tab-DONE" class="tab-btn text-emerald-700 ml-auto" onclick="switchTab('DONE')">LƯU TRỮ (DONE)</div>
        </div>

        <!-- VIEWS: COMPANY & ARCHIVE -->
        <div id="view-company" class="block">
            <div class="table-container">
                <table id="compTable">
                    <thead>
                        <tr>
                            <th class="w-12">Task #</th>
                            <th class="task-name-col">Task Name</th>
                            <th class="w-24">Start Date</th>
                            <th class="w-24">Due Date</th>
                            <th class="w-16">Days</th>
                            <th class="w-28">Status</th>
                            <th class="w-20">Prog %</th>
                            <th class="w-48">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="compBody"></tbody>
                </table>
            </div>
        </div>

        <!-- VIEWS: DASHBOARD -->
        <div id="view-dashboard" class="hidden">
            <div class="flex gap-4 flex-wrap items-end bg-purple-50 p-4 rounded border border-purple-200 mb-4">
                <div><label class="block text-xs font-bold text-slate-600 mb-1">Từ ngày</label><input type="date" id="filterStart"></div>
                <div><label class="block text-xs font-bold text-slate-600 mb-1">Đến ngày</label><input type="date" id="filterEnd"></div>
                <div><label class="block text-xs font-bold text-slate-600 mb-1">Trạng thái</label>
                    <select id="filterStatus" class="w-40">
                        <option value="ALL">Tất cả</option>
                        <option value="Complete">Hoàn thành</option>
                        <option value="Incomplete">Chưa hoàn thành</option>
                    </select>
                </div>
                <button onclick="renderDashboard()" class="bg-purple-600 text-white font-bold px-6 py-[9px] rounded shadow hover:bg-purple-700">LỌC DỮ LIỆU</button>
                
                <div class="ml-auto flex gap-3 text-xs font-bold items-center">
                    <span class="flex items-center gap-1"><span class="inline-block w-4 h-4 bg-[#10b981] rounded-sm"></span> Complete</span>
                    <span class="flex items-center gap-1"><span class="inline-block w-4 h-4 bg-[#f59e0b] rounded-sm"></span> In Progress</span>
                    <span class="flex items-center gap-1"><span class="inline-block w-4 h-4 bg-[#f43f5e] rounded-sm"></span> Pending</span>
                    <span class="flex items-center gap-1 border-l-2 border-dashed border-red-500 pl-2 text-red-600">Today Marker</span>
                </div>
            </div>
            <div class="table-container">
                <table id="ganttTable">
                    <thead id="ganttHead"></thead>
                    <tbody id="ganttBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL THÊM/SỬA TASK -->
    <div id="taskModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl w-[500px]">
            <h3 id="modalTitle" class="text-xl font-bold text-slate-800 mb-4 border-b pb-2">Thông tin Công Việc</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Tên công việc <span class="text-red-500">*</span></label>
                    <input type="text" id="m_name" class="w-full">
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-sm font-bold text-slate-700 mb-1">Start Date <span class="text-red-500">*</span></label>
                        <input type="date" id="m_start" class="w-full">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm font-bold text-slate-700 mb-1">Due Date <span class="text-red-500">*</span></label>
                        <input type="date" id="m_due" class="w-full">
                    </div>
                </div>
                <!-- Vùng chọn trạng thái -->
                <div id="statusControlBox" class="flex gap-4">
                    <div class="w-full">
                        <label class="block text-sm font-bold text-slate-700 mb-1">Trạng thái (Tỷ lệ % tự động hóa)</label>
                        <select id="m_status" class="w-full bg-slate-50 font-semibold border-slate-300">
                            <option value="Not Start">Not Start (0%)</option>
                            <option value="Pending">Pending (25%)</option>
                            <option value="In Progress">In Progress (50%)</option>
                            <option value="Complete">Complete (100%)</option>
                        </select>
                    </div>
                </div>
                <div id="mainTaskWarning" class="hidden text-sm italic text-slate-500 bg-slate-100 p-2 rounded border border-slate-200">
                    * Trạng thái và % của Main Task được tính tự động dựa trên các Sub-task con.
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-5 py-2 bg-slate-300 text-slate-800 rounded font-bold hover:bg-slate-400">HỦY</button>
                <button onclick="saveTaskModal()" class="px-5 py-2 bg-slate-700 text-white rounded font-bold hover:bg-slate-800">LƯU LẠI</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // CẤU HÌNH FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyA8XGvUoCBWs8WUlwC2hUEHPF6RQl6eSM0",
            authDomain: "dailyworkplan-de669.firebaseapp.com",
            databaseURL: "https://dailyworkplan-de669-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dailyworkplan-de669",
            storageBucket: "dailyworkplan-de669.firebasestorage.app",
            messagingSenderId: "703304226095",
            appId: "1:703304226095:web:4b75c9cb7d2f9f32f57dda"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tasksRef = ref(db, 'tasks');

        const STATUS_MAP = { "Not Start": 0, "Pending": 25, "In Progress": 50, "Complete": 100 };

        window.allTasks = [];
        window.currentTab = 'SVL';
        window.modalState = { mode: '', parentId: null, dbKey: null, isMain: false };

        // LẮNG NGHE DỮ LIỆU
        onValue(tasksRef, (snapshot) => {
            window.allTasks = [];
            snapshot.forEach((child) => { window.allTasks.push({ dbKey: child.key, ...child.val() }); });
            
            window.allTasks.sort((a, b) => {
                let aParts = a.taskId.split('.').map(Number);
                let bParts = b.taskId.split('.').map(Number);
                for(let i=0; i < Math.max(aParts.length, bParts.length); i++) {
                    let av = aParts[i] || 0; let bv = bParts[i] || 0;
                    if(av !== bv) return av - bv;
                }
                return 0;
            });
            refreshViews();
        });

        window.switchTab = function(tabName) {
            window.currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            
            if(tabName === 'DASHBOARD') {
                document.getElementById('view-company').classList.add('hidden');
                document.getElementById('view-dashboard').classList.remove('hidden');
            } else {
                document.getElementById('view-company').classList.remove('hidden');
                document.getElementById('view-dashboard').classList.add('hidden');
            }
            refreshViews();
        };

        function refreshViews() {
            if(window.currentTab === 'DASHBOARD') renderDashboard();
            else renderCompanyTable();
        }

        // TÍNH TOÁN DATA
        function getProcessedTasks(filterComp = null, showDone = false) {
            let processed = JSON.parse(JSON.stringify(window.allTasks)); 
            processed = processed.filter(t => (t.archived === true) === showDone);
            if(filterComp && filterComp !== 'DONE' && filterComp !== 'DASHBOARD') {
                processed = processed.filter(t => t.company === filterComp);
            }

            processed.forEach(task => {
                if(task.taskId && task.taskId.includes('.')) {
                    task.progressSub = STATUS_MAP[task.status] !== undefined ? STATUS_MAP[task.status] : 0;
                }
            });

            processed.forEach(task => {
                if(!task.taskId.includes('.')) {
                    let subs = processed.filter(t => t.taskId.startsWith(task.taskId + '.'));
                    if(subs.length > 0) {
                        let sum = 0;
                        subs.forEach(s => sum += s.progressSub);
                        let avg = Math.round(sum / subs.length);
                        task.progressSub = avg;
                        
                        if(avg === 0) task.status = 'Not Start';
                        else if(avg === 100) task.status = 'Complete';
                        else task.status = 'In Progress';
                    } else {
                        task.progressSub = 0;
                        task.status = 'Not Start';
                    }
                }
            });
            return processed;
        }

        // HÀM HELPER XUẤT TÊN CLASS THEO STATUS
        function getStatusClass(status) {
            if(status === 'Complete') return 'text-status-complete';
            if(status === 'In Progress') return 'text-status-inprogress';
            if(status === 'Pending') return 'text-status-pending';
            return 'text-status-notstart';
        }
        function getGanttClass(status) {
            if(status === 'Complete') return 'gantt-complete';
            if(status === 'In Progress') return 'gantt-inprogress';
            if(status === 'Pending') return 'gantt-pending';
            return 'gantt-notstart';
        }

        // VẼ BẢNG CÔNG TY
        function renderCompanyTable() {
            let isDoneTab = (window.currentTab === 'DONE');
            let tasks = getProcessedTasks(window.currentTab, isDoneTab);
            let tbody = document.getElementById('compBody');
            tbody.innerHTML = '';
            
            if(tasks.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center p-6 text-slate-500 italic">Chưa có công việc nào trong danh sách này.</td></tr>`;
                return;
            }

            tasks.forEach(task => {
                let isMain = !task.taskId.includes('.');
                let sDate = task.startDate ? new Date(task.startDate) : null;
                let dDate = task.dueDate ? new Date(task.dueDate) : null;
                let days = (sDate && dDate) ? Math.round((dDate - sDate) / 86400000) + 1 : '';
                let sShow = sDate ? ("0"+sDate.getDate()).slice(-2)+"/"+("0"+(sDate.getMonth()+1)).slice(-2)+"/"+sDate.getFullYear() : '';
                let dShow = dDate ? ("0"+dDate.getDate()).slice(-2)+"/"+("0"+(dDate.getMonth()+1)).slice(-2)+"/"+dDate.getFullYear() : '';
                
                let stClass = getStatusClass(task.status);
                let indent = isMain ? 'font-bold text-[14px] text-slate-800' : 'pl-8 text-slate-600';
                
                let actionBtns = `<button onclick="editTask('${task.dbKey}')" class="text-blue-600 hover:text-blue-800 font-semibold mr-3">Sửa</button>
                                  <button onclick="deleteTask('${task.dbKey}', '${task.taskId}')" class="text-red-500 hover:text-red-700 font-semibold mr-3">Xóa</button>`;
                
                if(isMain && !isDoneTab) {
                    actionBtns += `<button onclick="openModal('${task.taskId}')" class="text-emerald-600 hover:text-emerald-800 font-semibold mr-3">+ Thêm Sub</button>`;
                    actionBtns += `<button onclick="archiveTask('${task.taskId}', '${task.company}')" class="text-blue-500 bg-blue-100 hover:bg-blue-200 px-2 py-1 rounded font-bold text-xs">Lưu 📥</button>`;
                }
                if(isMain && isDoneTab) {
                     actionBtns += `<span class="text-emerald-700 font-bold text-xs">Đã Lưu</span>`;
                }

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 border-b border-slate-200">
                        <td class="text-center font-bold text-slate-600">${task.taskId}</td>
                        <td class="task-name-col ${indent}">${isMain ? (isDoneTab ? `[${task.company}] ` : '') : '↳ '}${task.name}</td>
                        <td class="text-center">${sShow}</td>
                        <td class="text-center">${dShow}</td>
                        <td class="text-center">${days}</td>
                        <td class="text-center ${stClass}">${task.status}</td>
                        <td class="text-center font-bold ${stClass}">${task.progressSub}%</td>
                        <td class="">${actionBtns}</td>
                    </tr>
                `;
            });
        }

        // VẼ DASHBOARD & GANTT
        window.renderDashboard = function() {
            let fStart = document.getElementById('filterStart').value;
            let fEnd = document.getElementById('filterEnd').value;
            let fStatus = document.getElementById('filterStatus').value;
            
            let tasks = getProcessedTasks(null, false); 
            if(fStatus === 'Complete') tasks = tasks.filter(t => t.progressSub == 100);
            if(fStatus === 'Incomplete') tasks = tasks.filter(t => t.progressSub < 100);

            const thead = document.getElementById('ganttHead');
            const tbody = document.getElementById('ganttBody');
            thead.innerHTML = ''; tbody.innerHTML = '';
            if(tasks.length === 0) { tbody.innerHTML = '<tr><td colspan="10" class="text-center p-4">Không có dữ liệu.</td></tr>'; return; }

            // Lấy chuẩn ngày hôm nay (loại bỏ giờ phút)
            let today = new Date();
            today.setHours(0,0,0,0);

            let minDate = fStart ? new Date(fStart) : new Date("2099-12-31");
            let maxDate = fEnd ? new Date(fEnd) : new Date("1900-01-01");
            
            if(!fStart || !fEnd) {
                tasks.forEach(t => {
                    let s = t.startDate ? new Date(t.startDate) : null;
                    let d = t.dueDate ? new Date(t.dueDate) : null;
                    if(!fStart && s && s < minDate) minDate = s;
                    if(!fEnd && d && d > maxDate) maxDate = d;
                });
            }
            if(minDate > maxDate) { minDate = new Date(); maxDate = new Date(); }
            
            // Đảm bảo Gantt luôn hiển thị tối thiểu ôm trọn ngày hôm nay nếu nằm trong tháng
            if(today < minDate && !fStart) minDate = new Date(today);
            if(today > maxDate && !fEnd) maxDate = new Date(today);

            let dateRange = [];
            let curr = new Date(minDate);
            while(curr <= maxDate) { dateRange.push(new Date(curr)); curr.setDate(curr.getDate() + 1); }

            let trDay = `<tr><th rowspan="2" class="sticky-col">Comp</th><th rowspan="2">#</th><th rowspan="2" class="task-name-col text-left">Task Name</th><th rowspan="2">Status</th><th rowspan="2">Prog %</th>`;
            let trDate = `<tr>`;
            dateRange.forEach(d => {
                let isW = (d.getDay()===0 || d.getDay()===6) ? "bg-weekend-head" : "";
                let isT = (d.getTime() === today.getTime()) ? "today-head" : "";
                trDay += `<th class="${isW} ${isT}">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()]}</th>`;
                trDate += `<th class="${isW} ${isT}">${d.getDate() + "/" + (d.getMonth()+1)}</th>`;
            });
            thead.innerHTML = trDay + "</tr>" + trDate + "</tr>";

            tasks.forEach(task => {
                let sDate = task.startDate ? new Date(task.startDate) : null;
                if(sDate) sDate.setHours(0,0,0,0);
                let dDate = task.dueDate ? new Date(task.dueDate) : null;
                if(dDate) dDate.setHours(0,0,0,0);
                
                let stTextClass = getStatusClass(task.status);
                let stGanttClass = getGanttClass(task.status);
                let isMain = !task.taskId.includes('.');
                
                let rowHtml = `<tr>
                    <td class="sticky-col bg-white text-center font-bold text-slate-800">${task.company}</td>
                    <td class="text-center font-bold text-slate-600">${task.taskId}</td>
                    <td class="task-name-col ${isMain ? 'font-bold' : 'pl-6 text-slate-600'}">${isMain ? '' : '↳ '}${task.name}</td>
                    <td class="text-center ${stTextClass}">${task.status}</td>
                    <td class="text-center font-bold ${stTextClass}">${task.progressSub}%</td>`;

                dateRange.forEach(d => {
                    let dTime = d.getTime();
                    let isTaskDay = (sDate && dDate && dTime >= sDate.getTime() && dTime <= dDate.getTime());
                    let isT = (dTime === today.getTime()) ? "today-col" : "";
                    
                    let cellClass = isTaskDay ? stGanttClass : ((d.getDay()===0 || d.getDay()===6) ? "bg-weekend-body" : "");
                    rowHtml += `<td class="${cellClass} ${isT}"></td>`;
                });
                tbody.innerHTML += rowHtml + `</tr>`;
            });
        }

        // TẠO NHANH MAIN TASK TRÊN CÙNG
        window.quickAddMainTask = function() {
            let comp = document.getElementById('q_company').value;
            let name = document.getElementById('q_name').value.trim();
            let start = document.getElementById('q_start').value;
            let due = document.getElementById('q_due').value;

            if(!name || !start || !due) {
                alert("Vui lòng nhập Tên công việc, Ngày bắt đầu và Ngày kết thúc!");
                return;
            }

            let newId = getNextTaskId(comp, null);
            push(tasksRef, { company: comp, taskId: newId, name: name, startDate: start, dueDate: due, status: "Not Start", archived: false });

            document.getElementById('q_name').value = ''; document.getElementById('q_start').value = ''; document.getElementById('q_due').value = '';
            switchTab(comp); 
        }

        // LƯU TRỮ (ARCHIVE)
        window.archiveTask = function(taskId, comp) {
            if(confirm("Bạn muốn LƯU công việc này? (Nó và các Sub-task sẽ được chuyển qua tab LƯU TRỮ)")) {
                let toArchive = window.allTasks.filter(t => t.company === comp && (t.taskId === taskId || t.taskId.startsWith(taskId + '.')));
                toArchive.forEach(t => { update(ref(db, 'tasks/' + t.dbKey), { archived: true }); });
            }
        }

        // SINH MÃ TASK
        function getNextTaskId(company, parentId = null) {
            let compTasks = window.allTasks.filter(t => t.company === company);
            if(!parentId) { 
                let mains = compTasks.filter(t => !t.taskId.includes('.'));
                if(mains.length === 0) return "1";
                let max = Math.max(...mains.map(t => parseInt(t.taskId)));
                return (max + 1).toString();
            } else { 
                let subs = compTasks.filter(t => t.taskId.startsWith(parentId + '.'));
                if(subs.length === 0) return parentId + ".1";
                let max = Math.max(...subs.map(t => parseInt(t.taskId.split('.')[1])));
                return parentId + "." + (max + 1).toString();
            }
        }

        // MODAL
        window.openModal = function(parentId = null) {
            window.modalState = { mode: 'ADD', parentId: parentId, dbKey: null, isMain: !parentId };
            document.getElementById('modalTitle').innerText = `Thêm Sub-task cho Công việc ${parentId}`;
            document.getElementById('m_name').value = ''; document.getElementById('m_start').value = ''; document.getElementById('m_due').value = ''; document.getElementById('m_status').value = 'Not Start';
            
            document.getElementById('statusControlBox').classList.remove('hidden');
            document.getElementById('mainTaskWarning').classList.add('hidden');
            document.getElementById('taskModal').classList.remove('hidden');
        };

        window.editTask = function(dbKey) {
            let task = window.allTasks.find(t => t.dbKey === dbKey);
            if(!task) return;
            let isMain = !task.taskId.includes('.');
            window.modalState = { mode: 'EDIT', parentId: null, dbKey: dbKey, isMain: isMain };
            
            document.getElementById('modalTitle').innerText = `Sửa Thông tin: Task ${task.taskId}`;
            document.getElementById('m_name').value = task.name; document.getElementById('m_start').value = task.startDate; document.getElementById('m_due').value = task.dueDate; document.getElementById('m_status').value = task.status;
            
            if(isMain) {
                document.getElementById('statusControlBox').classList.add('hidden');
                document.getElementById('mainTaskWarning').classList.remove('hidden');
            } else {
                document.getElementById('statusControlBox').classList.remove('hidden');
                document.getElementById('mainTaskWarning').classList.add('hidden');
            }
            document.getElementById('taskModal').classList.remove('hidden');
        };

        window.closeModal = function() { document.getElementById('taskModal').classList.add('hidden'); };

        window.saveTaskModal = function() {
            let nName = document.getElementById('m_name').value; let nStart = document.getElementById('m_start').value; let nDue = document.getElementById('m_due').value; let nStatus = document.getElementById('m_status').value;
            if(!nName || !nStart || !nDue) return alert('Vui lòng nhập đủ Tên và Ngày tháng!');

            let payload = { name: nName, startDate: nStart, dueDate: nDue };
            if(!window.modalState.isMain) payload.status = nStatus;

            if(window.modalState.mode === 'ADD') {
                payload.company = window.currentTab; payload.taskId = getNextTaskId(window.currentTab, window.modalState.parentId); payload.archived = false;
                push(tasksRef, payload);
            } else if (window.modalState.mode === 'EDIT') { update(ref(db, 'tasks/' + window.modalState.dbKey), payload); }
            closeModal();
        };

        window.deleteTask = function(dbKey, taskId) {
            let isMain = !taskId.includes('.');
            let msg = isMain ? `CẢNH BÁO: Xóa Main Task ${taskId} sẽ KHÔNG xóa Sub-task tự động. Đề nghị xóa Sub-task trước. Xóa ngay?` : `Xác nhận xóa Sub-task ${taskId}?`;
            if (confirm(msg)) { remove(ref(db, 'tasks/' + dbKey)); }
        };
    </script>
</body>
</html>
