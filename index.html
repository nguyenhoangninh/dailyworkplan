<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Work Plan - Realtime Gantt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tùy chỉnh CSS để bảng hiển thị giống hệt Excel */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 13px; }
        table { border-collapse: collapse; width: 100%; white-space: nowrap; }
        th, td { border: 1px solid #b4c6e7; padding: 6px 10px; text-align: left; }
        th { background-color: #1f4e78; color: white; text-align: center; font-weight: bold; }
        .text-center { text-align: center; }
        .bg-weekend-head { background-color: #0070c0 !important; } /* Thứ 7, CN Header */
        .bg-weekend-body { background-color: #f2f2f2; } /* Nền cột Thứ 7, CN */
        
        /* Bảng màu Trạng thái chuẩn Excel */
        .status-complete { background-color: #c6efce; color: #006100; font-style: italic; }
        .status-inprogress { background-color: #ffff99; color: #9c6500; font-style: italic; }
        .status-pending { background-color: #ffc7ce; color: #9c0006; font-style: italic; }
        
        /* Cố định cột bên trái khi cuộn ngang */
        .table-container { overflow-x: auto; max-width: 100vw; border: 1px solid #ccc; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 15px;}
        .sticky-col { position: sticky; left: 0; background-color: white; z-index: 10; border-right: 2px solid #8ea9db;}
        th.sticky-col { background-color: #1f4e78; z-index: 11; }
        
        input, select { border: 1px solid #ccc; padding: 6px; border-radius: 4px; font-size: 13px;}
    </style>
</head>
<body class="bg-gray-50 p-4">

    <div class="max-w-full mx-auto bg-white p-4 rounded">
        <h1 class="text-xl font-bold text-blue-800 mb-4 uppercase">DAILY WORK PLAN - GANTT CHART (AUTO-GENERATED REALTIME)</h1>
        
        <!-- Bảng điều khiển nhập liệu -->
        <div class="flex gap-2 flex-wrap items-end bg-blue-50 p-4 rounded border border-blue-200">
            <div>
                <label class="block text-xs font-bold text-gray-600">Company</label>
                <input type="text" id="f_company" placeholder="VD: SVL" class="w-20">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600">Task #</label>
                <input type="text" id="f_taskId" placeholder="1, 1.1..." class="w-16">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600">Task Name</label>
                <input type="text" id="f_name" placeholder="Tên công việc" class="w-48">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600">Start Date</label>
                <input type="date" id="f_start" class="w-32">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600">Due Date</label>
                <input type="date" id="f_due" class="w-32">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600">Status</label>
                <select id="f_status" class="w-28">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Complete">Complete</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600">Prog % (Sub)</label>
                <input type="number" id="f_prog" placeholder="%" class="w-20" min="0" max="100">
            </div>
            <button id="btnAddTask" class="bg-blue-600 text-white font-bold px-6 py-2 rounded hover:bg-blue-700 h-[34px]">TẠO TASK</button>
        </div>

        <!-- Khung chứa bảng Excel -->
        <div class="table-container">
            <table id="ganttTable">
                <thead id="ganttHead">
                    <!-- Javascript sẽ tự động vẽ Header vào đây -->
                </thead>
                <tbody id="ganttBody">
                    <!-- Javascript sẽ tự động vẽ Data và màu Gantt vào đây -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Script kết nối Firebase & Xử lý thuật toán Gantt -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // Cấu hình Firebase gốc của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyA8XGvUoCBWs8WUlwC2hUEHPF6RQl6eSM0",
            authDomain: "dailyworkplan-de669.firebaseapp.com",
            databaseURL: "https://dailyworkplan-de669-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dailyworkplan-de669",
            storageBucket: "dailyworkplan-de669.firebasestorage.app",
            messagingSenderId: "703304226095",
            appId: "1:703304226095:web:4b75c9cb7d2f9f32f57dda",
            measurementId: "G-447Z32NZZX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tasksRef = ref(db, 'tasks');

        // Lắng nghe dữ liệu
        onValue(tasksRef, (snapshot) => {
            let tasks = [];
            snapshot.forEach((child) => {
                tasks.push({ dbKey: child.key, ...child.val() });
            });
            renderGanttChart(tasks);
        });

        // Hàm bổ trợ Date
        function parseDate(dateStr) { return new Date(dateStr); }
        function formatDateShow(dateObj) {
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return dateObj.getDate() + "-" + months[dateObj.getMonth()];
        }
        function formatDayName(dateObj) {
            const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
            return days[dateObj.getDay()];
        }
        function isWeekend(dateObj) {
            return dateObj.getDay() === 0 || dateObj.getDay() === 6;
        }

        function renderGanttChart(tasks) {
            const thead = document.getElementById('ganttHead');
            const tbody = document.getElementById('ganttBody');
            thead.innerHTML = ''; tbody.innerHTML = '';

            if (tasks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center p-4">Chưa có dữ liệu công việc.</td></tr>';
                return;
            }

            // 1. Tìm ngày Min và Max để vẽ trục thời gian
            let minDate = new Date("2099-12-31");
            let maxDate = new Date("1900-01-01");
            
            tasks.forEach(t => {
                let s = new Date(t.startDate);
                let d = new Date(t.dueDate);
                if (s < minDate) minDate = s;
                if (d > maxDate) maxDate = d;
            });

            // Nếu dữ liệu ngày lỗi, set mặc định
            if (minDate > maxDate) { minDate = new Date(); maxDate = new Date(); }

            // Tạo mảng các ngày trên trục
            let dateRange = [];
            let curr = new Date(minDate);
            while (curr <= maxDate) {
                dateRange.push(new Date(curr));
                curr.setDate(curr.getDate() + 1);
            }

            // 2. VẼ HEADER BẢNG
            let trDay = `<tr>
                <th rowspan="2" class="sticky-col">Company</th>
                <th rowspan="2">Task #</th>
                <th rowspan="2" style="min-width: 200px;">Task Name</th>
                <th rowspan="2">Start Date</th>
                <th rowspan="2">Due Date</th>
                <th rowspan="2">Days</th>
                <th rowspan="2">Status</th>
                <th rowspan="2">Progress %<br>(Main)</th>
                <th rowspan="2">Progress %<br>(Sub)</th>
                <th rowspan="2">Xóa</th>`;
            
            let trDate = `<tr>`;

            dateRange.forEach(d => {
                let headClass = isWeekend(d) ? "bg-weekend-head" : "";
                trDay += `<th class="${headClass}">${formatDayName(d)}</th>`;
                trDate += `<th class="${headClass}">${formatDateShow(d)}</th>`;
            });
            trDay += `</tr>`; trDate += `</tr>`;
            thead.innerHTML = trDay + trDate;

            // 3. TÍNH TOÁN PROGRESS MAIN VÀ VẼ BODY
            tasks.forEach(task => {
                // Tính toán trung bình Subtasks cho Main task
                let mainProgress = "";
                if (task.taskId && !task.taskId.includes('.')) {
                    let subTasks = tasks.filter(t => t.taskId && t.taskId.startsWith(task.taskId + '.'));
                    if (subTasks.length > 0) {
                        let sum = 0; let count = 0;
                        subTasks.forEach(st => {
                            if (st.progressSub !== "") { sum += parseFloat(st.progressSub); count++; }
                        });
                        if (count > 0) mainProgress = Math.round(sum / count);
                    } else {
                        mainProgress = task.progressSub; // Nếu không có sub, lấy chính nó
                    }
                }

                // Tính toán số ngày
                let sDate = new Date(task.startDate);
                let dDate = new Date(task.dueDate);
                let daysCount = Math.round((dDate - sDate) / (1000 * 60 * 60 * 24)) + 1;
                
                // Định dạng hiển thị ngày
                let sShow = ("0" + sDate.getDate()).slice(-2) + "/" + ("0" + (sDate.getMonth() + 1)).slice(-2) + "/" + sDate.getFullYear();
                let dShow = ("0" + dDate.getDate()).slice(-2) + "/" + ("0" + (dDate.getMonth() + 1)).slice(-2) + "/" + dDate.getFullYear();

                // Xác định màu sắc Status
                let statusClass = task.status === 'Complete' ? 'status-complete' : 
                                  task.status === 'In Progress' ? 'status-inprogress' : 'status-pending';

                // In CSS cho dòng task con
                let nameIndent = task.taskId && task.taskId.includes('.') ? '&rarr; ' : '';

                let rowHtml = `<tr>
                    <td class="sticky-col bg-white">${task.company}</td>
                    <td class="text-center">${task.taskId}</td>
                    <td>${nameIndent}${task.name}</td>
                    <td class="text-center">${sShow}</td>
                    <td class="text-center">${dShow}</td>
                    <td class="text-center">${daysCount > 0 ? daysCount : ''}</td>
                    <td class="text-center ${statusClass}">${task.status}</td>
                    <td class="text-center ${mainProgress !== "" ? statusClass : ''}">${mainProgress}</td>
                    <td class="text-center ${task.progressSub !== "" ? statusClass : ''}">${task.progressSub}</td>
                    <td class="text-center"><button onclick="deleteTask('${task.dbKey}')" class="text-red-500 hover:text-red-700 font-bold">X</button></td>`;

                // Render ô màu Gantt
                dateRange.forEach(d => {
                    let isTaskDay = (d >= sDate && d <= dDate);
                    let cellClass = isTaskDay ? statusClass : (isWeekend(d) ? "bg-weekend-body" : "");
                    rowHtml += `<td class="${cellClass}"></td>`;
                });

                rowHtml += `</tr>`;
                tbody.innerHTML += rowHtml;
            });
        }

        // XỬ LÝ SỰ KIỆN THÊM TASK
        document.getElementById('btnAddTask').addEventListener('click', () => {
            const nName = document.getElementById('f_name').value;
            const nStart = document.getElementById('f_start').value;
            const nDue = document.getElementById('f_due').value;

            if (!nName || !nStart || !nDue) {
                alert('Vui lòng nhập Tên công việc, Ngày bắt đầu và Ngày kết thúc!');
                return;
            }

            push(tasksRef, {
                company: document.getElementById('f_company').value,
                taskId: document.getElementById('f_taskId').value,
                name: document.getElementById('f_name').value,
                startDate: nStart,
                dueDate: nDue,
                status: document.getElementById('f_status').value,
                progressSub: document.getElementById('f_prog').value
            });

            // Xóa form sau khi add
            document.getElementById('f_taskId').value = '';
            document.getElementById('f_name').value = '';
            document.getElementById('f_prog').value = '';
        });

        // Hàm xóa gắn vào window
        window.deleteTask = function(dbKey) {
            if (confirm('Bạn có chắc chắn muốn xóa dòng công việc này?')) {
                remove(ref(db, 'tasks/' + dbKey));
            }
        };
    </script>
</body>
</html>
