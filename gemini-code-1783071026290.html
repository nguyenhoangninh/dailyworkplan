<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Daily Work Plan - Realtime</title>
    <!-- Sử dụng Tailwind CSS để làm đẹp giao diện nhanh chóng -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">

    <div class="max-w-7xl mx-auto bg-white p-6 rounded shadow-lg border-t-4 border-blue-800">
        <h1 class="text-2xl font-bold text-blue-900 mb-6">DAILY WORK PLAN - REALTIME GANTT DATABASE</h1>
        
        <!-- Form thêm công việc nhanh -->
        <div class="mb-6 flex gap-4 items-center bg-blue-50 p-4 rounded border border-blue-100">
            <input type="text" id="taskName" placeholder="Tên công việc (VD: Kiểm tra sổ sách)..." class="border border-gray-300 p-2 rounded w-1/3 focus:outline-none focus:border-blue-500">
            <select id="taskStatus" class="border border-gray-300 p-2 rounded focus:outline-none focus:border-blue-500">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Complete">Complete</option>
            </select>
            <button id="btnAddTask" class="bg-blue-600 text-white font-semibold px-6 py-2 rounded shadow hover:bg-blue-700 transition">Thêm Task</button>
        </div>

        <!-- Bảng công việc -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse border border-gray-300">
                <thead>
                    <tr class="bg-blue-900 text-white">
                        <th class="p-3 border border-gray-300">Task Name</th>
                        <th class="p-3 border border-gray-300 w-40 text-center">Status</th>
                        <th class="p-3 border border-gray-300 w-48 text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody">
                    <!-- Dữ liệu từ Firebase sẽ tự động đổ vào đây -->
                    <tr>
                        <td colspan="3" class="p-4 text-center text-gray-500 italic">Đang tải dữ liệu từ máy chủ...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Script kết nối Firebase (Phiên bản Modular) -->
    <script type="module">
        // 1. Import các hàm cần thiết từ Firebase CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // 2. Cấu hình Firebase CỦA BẠN
        const firebaseConfig = {
            apiKey: "AIzaSyA8XGvUoCBWs8WUlwC2hUEHPF6RQl6eSM0",
            authDomain: "dailyworkplan-de669.firebaseapp.com",
            databaseURL: "https://dailyworkplan-de669-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dailyworkplan-de669",
            storageBucket: "dailyworkplan-de669.firebasestorage.app",
            messagingSenderId: "703304226095",
            appId: "1:703304226095:web:4b75c9cb7d2f9f32f57dda",
            measurementId: "G-447Z32NZZX"
        };

        // 3. Khởi tạo ứng dụng và kết nối Database
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tasksRef = ref(db, 'tasks');

        // 4. LẮNG NGHE DỮ LIỆU REAL-TIME
        const tableBody = document.getElementById('taskTableBody');
        
        onValue(tasksRef, (snapshot) => {
            tableBody.innerHTML = ''; // Làm sạch bảng
            
            if (!snapshot.exists()) {
                tableBody.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-gray-500">Chưa có công việc nào. Hãy thêm mới!</td></tr>';
                return;
            }

            snapshot.forEach((childSnapshot) => {
                const task = childSnapshot.val();
                const taskId = childSnapshot.key;
                
                // Set màu nền chuẩn theo bảng màu Gantt của bạn
                let bgColor = task.status === 'Complete' ? 'bg-[#c6efce] text-green-800' : 
                              task.status === 'In Progress' ? 'bg-[#ffff99] text-yellow-800' : 'bg-[#ffc7ce] text-red-800';

                tableBody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-200">
                        <td class="p-3 border-r border-gray-300">${task.name}</td>
                        <td class="p-3 border-r border-gray-300 text-center font-semibold ${bgColor}">${task.status}</td>
                        <td class="p-3 text-center">
                            <button onclick="updateStatus('${taskId}', 'Complete')" class="text-sm bg-green-600 text-white px-2 py-1 rounded hover:bg-green-700 mr-1" title="Đánh dấu hoàn thành">✔</button>
                            <button onclick="updateStatus('${taskId}', 'In Progress')" class="text-sm bg-yellow-500 text-white px-2 py-1 rounded hover:bg-yellow-600 mr-1" title="Đang làm">⏳</button>
                            <button onclick="deleteTask('${taskId}')" class="text-sm bg-red-600 text-white px-2 py-1 rounded hover:bg-red-700" title="Xóa bỏ">✖</button>
                        </td>
                    </tr>
                `;
            });
        });

        // 5. CÁC HÀM XỬ LÝ SỰ KIỆN
        
        // Thêm task
        document.getElementById('btnAddTask').addEventListener('click', () => {
            const nameInput = document.getElementById('taskName');
            const statusInput = document.getElementById('taskStatus');
            
            if (nameInput.value.trim() === '') {
                alert('Vui lòng nhập tên công việc!');
                return;
            }
            
            push(tasksRef, {
                name: nameInput.value.trim(),
                status: statusInput.value,
                timestamp: Date.now()
            });
            
            nameInput.value = ''; // Xóa trắng ô nhập sau khi gửi
        });

        // Gắn hàm cập nhật và xóa vào window để sử dụng được trong thẻ HTML onclick
        window.updateStatus = function(taskId, newStatus) {
            update(ref(db, 'tasks/' + taskId), { status: newStatus });
        };

        window.deleteTask = function(taskId) {
            if (confirm('Bạn có chắc chắn muốn xóa công việc này không?')) {
                remove(ref(db, 'tasks/' + taskId));
            }
        };
    </script>
</body>
</html>
